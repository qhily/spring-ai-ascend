review_notes: >
  Layer-purity: this ADR roots its decision in the L0 kernel as a system-wide
  invariant on every hook chain (two-level failure semantics + the REQUIREMENT of a
  deterministic, registration-driven ordering with a framework-independent
  tie-break), classified here as L0 governance_invariant. The concrete ordering
  ALGORITHM — the registration-order direction (BEFORE_* ascending / AFTER_* reverse)
  and the Class.getName() lexicographic tie-break — is L2 FunctionPoint detail and is
  recorded as non_authoritative_legacy_content rather than active_guidance, the same
  L5-filter-ordering mechanism the L0 allow-list grandfathers as
  LPV-l0-hook-chain-ordering (migrate_to the L2 hook-dispatch frame + the hook
  contract). active_guidance now states only the deterministic-tie-break INVARIANT;
  the HookDispatcher.sort comparator expression and the two named test classes are
  likewise non-authoritative, with the live code/test facts and the canonical hook
  contract owning that detail. AMBIGUITY FLAGGED FOR HUMAN REVIEW: the
  decision is equally defensible as an L1 cross_frame_contract, since its canonical
  authority is a contract surface (engine-hooks.v1.yaml#failure_propagation) spanning
  the middleware frame and the invocation boundary. The view chose L0
  governance_invariant because the raw ADR sites the two-level semantics in the L0
  kernel constraint as an invariant over every hook; the reconcile/ledger step may
  prefer the L1/contract reading. current_state is unambiguous (partial_guidance).
