# Layer-Purity Temporary Violations — the known, not-yet-migrated leaks.
#
# Authority: ADR-0159 (Progressive Learning Curve and Authority Lanes) §7 + §9.
# Companion policy: docs/governance/layer-purity-policy.yaml (the owns/forbids
#   category vocabulary every row here cites).
# Baseline-truth input: docs/governance/remediation-inventory/layer-purity-scan.md
#   (the line-referenced, advisory scan that classified each leak LEAKED vs
#   DEFENSIBLE against the adjudicated verdict). Every row below is copied from
#   a LEAKED row of that scan; this file invents no new locus and no new
#   category.
#
# What this file IS. The closed, dated grandfather list of L2/code detail that
#   currently sits in an L0 or L1 architecture document in violation of the
#   layer-purity policy, but has not yet been migrated to its authoritative
#   home (L2 / contracts / generated facts). Each entry freezes one known
#   violation AND declares a per-entry sunset_date by which the migration MUST
#   complete. A closed-but-dateless grandfather list is an anti-pattern (every
#   entry MUST carry a sunset_date); this list is closed (no new entry may be
#   added once the lane-purity gate is blocking — new leaks must be fixed at
#   authoring time, never grandfathered).
#
# What this file is NOT. A migration plan (the scan §4 holds the priority
#   ordering), a rule card, or an enforcer row. The future lane-purity gate
#   (G-27..G-33, authored + promoted by the remediation waves per ADR-0159 §9,
#   NOT by this file) consumes this list as its allow-list: a leaked-category
#   block whose locus matches a non-expired row here is tolerated; any leak
#   NOT listed here, or any row whose sunset_date has passed, fails the gate.
#   The authority cascade (generated facts > DSL > Card/prose) is untouched.
#
# Schema:
#   schema_version  - integer, bumped when fields are added.
#   authority       - the ratifying ADR id.
#   last_updated    - ISO yyyy-mm-dd (UTC). UTC convention (a local +08 date
#                     can be UTC-future and trip a freshness gate).
#   status          - advisory | blocking. Advisory until the lane-purity gate
#                     promotes to blocking per ADR-0159 §9. This is the LIST's
#                     posture, not a contract-status enum (Rule 62 does not
#                     apply — this is not a docs/contracts/*.v1.yaml).
#   list_closed     - true. No new violation may be grandfathered; new leaks
#                     are fixed at authoring time.
#   violations[]    - one row per known leak. Each row:
#       id          - stable kebab id, prefix LPV- (Layer-Purity Violation).
#       layer       - L0 | L1 (the over-layer the leak currently sits in).
#       file        - the offending authority document (module-relative path).
#       locus       - the smallest in-file anchor (section + line range) as
#                     recorded by the scan; for cross-reference, NOT a code
#                     fact.
#       category    - the leaked-category id from layer-purity-policy.yaml
#                     (one of L1..L8). Multiple categories -> categories[].
#       categories  - OPTIONAL list when a single block leaks more than one
#                     category (used instead of `category`).
#       trigger     - the smallest verbatim phrase that makes it a leak (from
#                     the scan). Quoted as EVIDENCE, never as a live claim.
#       migrate_to  - the authoritative home the detail must move to.
#       sunset_date - REQUIRED ISO yyyy-mm-dd by which migration MUST complete
#                     and this row MUST be removed. Tiered by scan §4 priority:
#                     highest-priority L0 leaks 2026-06-30 (v1.0 boundary);
#                     L1 agent-service corpus 2026-07-31 (aligned with the
#                     saa-property-authority.yaml grandfather sunset already in
#                     flight); lower-priority deferred-row / other-module leaks
#                     2026-08-31.
#       scan_ref    - the scan section the row was copied from.
#       defensible_part - OPTIONAL note on the identity portion of a mixed
#                     block that MAY stay after the leaked detail is extracted.
#
# Change log (this file is an exempt surface for wave/log metadata):
#   2026-05-30 — agent-service L1 cleanup. The L2/code detail named by the
#     agent-service rows below was drained out of the L1 prose into the active
#     L2 sinks (architecture/docs/L2/run-http-contract/{logical,process,
#     development}.md) + the generated facts; the L1 4+1 views now carry only
#     structural layer/aggregate/SPI-boundary identity + obligation-level
#     delegation. Six rows whose file+category the advisory layer-purity gate
#     (gate/lib/check_layer_purity.py, E194) now scans LEAK-FREE were removed:
#     LPV-l1-as-test-inventory, LPV-l1-as-spi-signatures (the inlined
#     `Execute(TaskMetadata, InjectedContext) -> StateDelta` SPI signature was
#     replaced with a code-symbol/contract delegation), LPV-l1-as-process-
#     idempotency-status, LPV-l1-as-process-cas-chain,
#     LPV-l1-as-process-cancel-cas-sql, LPV-l1-as-scenarios-status. The
#     remaining agent-service rows are retained: the gate still detects a
#     same-category trigger token in each of those files, but the residual is a
#     DEFENSIBLE construct the regex cannot tell from a leak — a process-view
#     section heading / cross-link that NAMES a flow (e.g. "cancel-race loser
#     P6"), a Boundary-Contract delegation pointer that NAMES the migrated
#     detail to say it is delegated (e.g. "the RLS policy bodies ... is
#     delegated to development.md §5.3", "traceparent behaviour per ADR-0061"),
#     or an obligation-level statement ("RLS policy required") inside a Rule
#     G-1.1.c delegation frame. The dated allow-list is the sanctioned
#     tolerance for exactly such regex-indistinguishable residue.

