  - id: F-adr-id-collision-across-files
    title: Two or More ADR Source Files Declare the Same id, Silently Collapsing in the ID-Keyed Extractors
    first_observed_rc: progressive-learning-curve-remediation-W1-2026-05-29
    last_observed_rc: progressive-learning-curve-remediation-W1-2026-05-29
    occurrences: [progressive-learning-curve-remediation-W1-2026-05-29]
    root_cause: |
      Multiple ADR source files under docs/adr/ carry the same `id:` value.
      Both the fact extractor (tools/architecture-workspace
      #AdrFactExtractor) and the DSL emitter (#AdrGraphFragmentEmitter) key
      ADRs by their `id:` field, not by filename — AdrGraphFragmentEmitter
      builds a `TreeMap<String,...>` keyed by id, so N files sharing one id
      collapse to a SINGLE map entry (last-writer-wins by file-sort order),
      silently dropping the other N-1 ADRs from architecture/generated/
      adr-graph.dsl AND from the workspace closure. A reviewer (or an AI
      agent) reading "ADR-0159" likewise cannot tell which of the colliding
      decisions the number names — the governance-clarity failure the
      progressive-learning-curve remediation is closing at the corpus level.
      Distinct from F-vocabulary-identity-collision (two same-simple-name
      Java types in one module) and F-architecture-authority-fragmentation
      (one inventory split across surfaces): here a single authoritative
      IDENTIFIER (the ADR number) is multiply-claimed across sibling files in
      one authority lane. Observed 2026-05-29 when the three methodology-
      ratification ADRs were drafted all carrying `id: ADR-0159`
      (0159-progressive-learning-curve-and-authority-lanes.yaml,
      0159-adr-governance-model.yaml,
      0159-engineering-frame-package-cluster-anchor-and-card-over-dsl.yaml);
      adrs.json enumerated only the file that sorted last and adr-graph.dsl
      would have emitted a single ADR-0159 node for all three. Reconciliation
      renumbered them to 0159 / 0160 / 0161 (id field + filename in lockstep),
      after which the fact layer enumerated 91 unique ADR ids and the graph
      gained the expected +3 nodes / +28 edges.
    surfaces:
      - docs/adr/*.yaml
      - architecture/facts/generated/adrs.json
      - architecture/generated/adr-graph.dsl
      - tools/architecture-workspace/src/main/java/com/huawei/ascend/tools/architecture/facts/AdrFactExtractor.java
      - tools/architecture-workspace/src/main/java/com/huawei/ascend/tools/architecture/fragment/AdrGraphFragmentEmitter.java
    prevention_rules:
      - "Reconciliation discipline (this wave): when ADRs are authored in parallel, assign distinct ids before merge; the id: field and the NNNN- filename prefix move in lockstep."
      - "candidate gate-rule (free band G-27..G-33) — glob docs/adr/*.yaml + docs/adr/locked/*.md, parse each id:, FAIL closed on any duplicate id across files; the non-vacuity guard fails the rule if zero ADR files are matched. This makes the silent TreeMap/extractor collapse a fail-closed condition instead of a last-writer-wins data loss."
      - "ADR-0160 (ADR Governance Model) — the adr-remediation-ledger keys one entry per raw ADR by raw_path, so a duplicate id surfaces as two ledger rows pointing at different files; G-28 (ADR Normalization) requires a normalized view per accepted ADR id, which a collision cannot satisfy uniquely."
    cleanup_status: monitoring
    open_residual: |
      The concrete 0159x3 collision is fully resolved (renumbered to
      0159/0160/0161; fact layer + graph regenerated and verified unique).
      No executable gate yet fails closed on a future duplicate ADR id — the
      candidate ID-uniqueness check above is registered as planning input for
      the free G-27..G-33 band and is not authored by this methodology-
      ratification wave (which ships no rule/enforcer/gate by itself per
      ADR-0159 section 9). Promotion to `closed` requires that gate to land
      blocking with positive AND negative self-test fixtures.

  - id: F-dangling-authority-reference
    title: Interpretation Layer Names a Data-Authority File as Its Source of Truth Before That File Exists
    first_observed_rc: progressive-learning-curve-remediation-W8-2026-05-30
    last_observed_rc: progressive-learning-curve-remediation-W23-2026-05-30
    occurrences: [progressive-learning-curve-remediation-W8-2026-05-30, progressive-learning-curve-remediation-W21-2026-05-30, progressive-learning-curve-remediation-W23-2026-05-30]
    root_cause: |
      A readable-interpretation / derived layer (a traceability matrix, a DSL
      back-reference property, a card) declares a specific data-authority file
      as its single source of truth, but that authority file is never created
      in the same wave — so the authority pointer resolves to nothing. The
      single-source-of-truth cascade (generated facts > DSL > Card/prose)
      depends on the cited authority actually existing; when it does not, the
      derived layer silently becomes the de-facto authority it disclaims, and
      a reader following the pointer hits a missing file. Distinct from
      F-architecture-authority-fragmentation (one real inventory split across
      several existing surfaces) and F-adr-id-collision-across-files (one
      identifier multiply-claimed across existing files): here the cited
      authority surface is ABSENT, not split or duplicated. Observed
      2026-05-30 when the progressive-learning-curve value-axis wiring added
      the Requirement node (node N2): architecture/features/features.dsl and
      function-points.dsl gained saa.requirement "REQ-NNN" back-references and
      docs/governance/requirement-feature-functionpoint-traceability.md was
      authored citing "Requirement data authority: product/requirements.yaml"
      in its frontmatter and section 1 — but product/requirements.yaml did not
      exist (the W0 entry-and-requirements-gap inventory had flagged its
      absence as gap G-5). The matrix and the DSL back-references therefore
      pointed at a file that was not on disk. ADR-0159 had already named
      product/requirements.yaml as the L2-REQUIREMENT lane authority, so the
      decision authority existed; only the data file lagged. W8 closed the
      dangle by creating product/requirements.yaml (REQ-001..REQ-009 derived
      one-to-one from the nine value-thread Features, each carrying
      source_claim / feature / function_points / source_adr / priority /
      status / rationale / acceptance_criteria), after which every cited
      REQ-NNN and the matrix authority pointer resolve to a real row.
    surfaces:
      - product/requirements.yaml
      - docs/governance/requirement-feature-functionpoint-traceability.md
      - architecture/features/features.dsl (saa.requirement back-reference)
      - architecture/features/function-points.dsl (saa.requirement back-reference)
      - docs/adr/0159-progressive-learning-curve-and-authority-lanes.yaml (L2-REQUIREMENT lane authority naming)
      - docs/governance/recurring-defect-families.yaml (family-surface globs — W21 stale docs/L2/ prefix)
      - architecture/docs/L2/README.md (L2 corpus index)
      - docs/governance/ai-reading-path.yaml (W23 — reading-path navigation surface citing per-step data authorities + factual-claim-switch fact files)
      - docs/onboarding/ai-understanding-path.md (W23 — human-readable companion mirror)
      - gate/lib/check_ai_reading_path.py (W23 — the executable materializability guard, Rule 148 / G-31 / E198)
    prevention_rules:
      - "Reconciliation discipline (this wave): when an interpretation layer or a DSL back-reference cites a data-authority file as its single source of truth, that authority file MUST exist in the SAME wave — author the data file before, or in lockstep with, the layer that points at it. A dangling authority pointer is a blocker, not a TODO."
      - "Rule G-31 / gate Rule 148 / enforcer E198 (ai_reading_path, gate/lib/check_ai_reading_path.py) — STANDING EXECUTABLE GUARD for the reading-path instance of this family: every orientation_learning_path surface in docs/governance/ai-reading-path.yaml marked presence: present, the companion mirror, and every factual_claim_switch.read_before_prose fact file MUST resolve on disk (MISSING-SURFACE / MISSING-COMPANION / MISSING-FACT-FILE), and every step-1 entry doc plus the always-load SESSION-START-CONTEXT.md MUST route onto the path (MISSING-MARKER); the data file is greenfield-vacuous until authored, then fails closed (exit 2) if it cannot be parsed or its companion + fact files vanish. Landed ADVISORY at the ADR-0159 §13.3 rung (advisory -> changed-files-blocking -> full-blocking); this is the first fail-closed-shaped check for a dangling NAVIGATION authority, the durable form the open_residual tracked as a candidate."
      - "candidate gate-rule (free band G-27..G-33) — REQ referential integrity: every saa.requirement \"REQ-NNN\" in architecture/features/*.dsl MUST resolve to a REQ-NNN row in product/requirements.yaml, and every REQ-NNN source_claim MUST resolve to a PC-NNN in product/claims.yaml; a non-vacuity guard fails the rule if zero saa.requirement properties are matched. This makes the dangle a fail-closed condition rather than a silently-missing file. Mirrors the existing Rule G-16/G-17/G-18 chain on the ProductClaim -> Feature -> FunctionPoint sub-axis, extended to the Requirement node."
      - "ADR-0159 (progressive learning curve) section LOCKSTEP FLAG — the lane partition is advisory until the G-27..G-33 band is authored and promoted to blocking; until then, reviewer discipline plus the existing G-16/G-17/G-18 chain on the claim->feature->fp sub-axis is the guard."
    cleanup_status: monitoring
    open_residual: |
      The concrete dangle is fully resolved: product/requirements.yaml now
      exists with REQ-001..REQ-009, every saa.requirement back-reference and
      the matrix authority pointer resolve, and the value-axis coverage
      invariants (every value-thread Feature has exactly one requirement; every
      requirement maps to >= 1 FunctionPoint; every ProductClaim retains >= 1
      downstream requirement) hold. No executable gate yet fails closed on a
      future dangling REQ reference — the candidate REQ-referential-integrity
      check above is registered as planning input for the free G-27..G-33 band
      and is NOT authored by this reconcile wave (per the ADR-0159 LOCKSTEP
      FLAG, which sequences the lane gates across later waves). Promotion to
      `closed` requires that gate to land blocking with positive AND negative
      self-test fixtures.

      W21 occurrence (SURFACE-GLOB variant — a governance surface points at a
      path prefix that does not exist on disk, so its freshness glob silently
      matches nothing). When the per-FunctionPoint L2 spec corpus was authored
      under architecture/docs/L2/fp-<name>/, eight recurring-defect-family rows
      still carried L2 `surfaces:` globs under the wrong prefix `docs/L2/...`
      (F-design-artifact-omits-tenant-spine, F-design-doc-violates-three-track-bus,
      F-design-doc-language-bypasses-invariant, F-placeholder-leaks-into-active-corpus,
      F-layer-decomposition-low-cohesion, F-frontmatter-claim-body-mismatch,
      F-logical-vs-structural-decomposition-conflation,
      F-design-only-mechanism-shown-as-shipped). The real L2 tree has always
      lived at architecture/docs/L2/, so the gate's freshness expander
      (check_recurring_families.sh) WARNed "glob expansion matched no files" and
      the families silently tracked zero design-doc surfaces — a non-vacuity hole
      identical in shape to the dangling REQ pointer above (the cited surface is
      ABSENT, here because the prefix is wrong, not because the file is missing).
      Closed by correcting all eight tokens to architecture/docs/L2/*.md /
      architecture/docs/L2/**/*.md and dropping the now-false "(when populated)"
      note (the corpus IS populated: three feature sinks + fourteen
      per-FunctionPoint specs). After the fix the eight globs resolve and the
      surfaces are tracked. A non-vacuity guard that FAILS a family-surface glob
      matching zero files (rather than WARNing) is the durable fix and remains a
      candidate for the free G-27..G-33 band.

      W23 occurrence (NAVIGATION-AUTHORITY variant + the first executable guard
      for this family). The AI reading path authored this wave
      (docs/governance/ai-reading-path.yaml + its companion
      docs/onboarding/ai-understanding-path.md) is exactly the family shape: an
      ONBOARDING / NAVIGATION interpretation layer that cites per-step data
      authorities (workspace.dsl, product/*, the generated-fact files, the
      contract catalog, the gate) as the order to read — so a declared surface
      that does not exist on disk, or an entry doc that names the path but fails
      to route onto it, would silently leave a reader following a dead pointer
      (or stranded on the legacy architecture-first order). Unlike the W8/W21
      occurrences, which were closed by hand (author the missing file / fix the
      stale prefix) with the executable guard left as a candidate, W23 LANDS that
      guard: Rule 148 / kernel Rule G-31 / enforcer E198
      (gate/lib/check_ai_reading_path.py) is the first fail-closed-shaped check
      for a dangling NAVIGATION authority — it asserts SURFACE EXISTENCE (every
      present surface + the companion + every factual-claim-switch fact file
      resolves), ENTRY-DOC ROUTING (README.md / CLAUDE.md / AGENTS.md +
      docs/governance/SESSION-START-CONTEXT.md reference the path), and
      YAML<->COMPANION LOCKSTEP. The four entry docs were wired onto the path in
      the same wave (0 advisory findings). The guard runs ADVISORY at the
      ADR-0159 §13.3 landing rung (advisory -> changed-files-blocking ->
      full-blocking); promotion to a blocking rung once the entry-doc corpus has
      fully migrated off the architecture-first order is the remaining residual,
      tracked by the Rule G-31 card §Ratchet. The data file is greenfield-vacuous
      until authored and then fails closed (exit 2) if it cannot be parsed or its
      companion / fact files vanish, so a future dangle on this surface is a hard
      stop, not a silent miss.

  - id: F-layer-gate-flags-delegation-pointer
    title: A Layer-Purity / Altitude Probe Fires on the Delegation Pointer It Should Reward (Matches the Category Noun, Not the Leak Mechanism)
    first_observed_rc: progressive-learning-curve-remediation-W15-2026-05-30
    last_observed_rc: progressive-learning-curve-remediation-W15-2026-05-30
    occurrences: [progressive-learning-curve-remediation-W15-2026-05-30]
    root_cause: |
      A layer-purity / altitude gate that classifies prose by topic-anchored
      regex cannot distinguish a LEAK (an L0/L1 doc inlining L2 mechanism — a
      SQL statement, an HTTP status, an on-wire grammar, a method call chain)
      from a DELEGATION POINTER (the same boundary doc NAMING the category only
      to hand it to its authoritative home: "the wire shape lives in
      `<contract>`", "filter ordering is **L2 / contract** material", "Enforced
      by integration `<IT>` ... per Rule R-C.a"). The probe matches the category
      NOUN ("wire shape", "filter ordering", a test-class token), which appears
      in BOTH the leak and the delegation. So at the advisory rung the gate is
      harmless, but the moment it is promoted to changed-files-blocking the
      cleanup waves' OWN delegation prose — the prose that did the migration
      correctly — fails the gate, and the naive "fix" is to weaken the gate
      until it passes (defeating it) rather than teach it the delegation shape.
      Distinct from F-gate-machinery-fail-open-pattern (a gate that PASSES when
      it should FAIL — the inverse): this is a gate that FAILS when it should
      PASS, on a sanctioned construct. Distinct from F-recursive-prevention-irony
      (a rule exhibiting the defect it bans): here the gate is correct in
      intent, only imprecise on the leak-vs-pointer boundary. Observed
      2026-05-30 (W15) when Rule 145 / G-27 was promoted advisory ->
      changed-files-blocking: of the 27 E195 (l2_detail_sink) full-corpus
      findings, 26 landed on changed files and ALL were delegation prose the
      W12-W15 cleanup authored — `wire_format` firing on "Wire shape (authority):
      `docs/contracts/ingress-envelope.v1.yaml`" and on the "deliberately does
      NOT carry ... filter ordering ... **L2 / contract** material" disclaimers;
      and the sole E194 (layer_purity) changed-file finding was constraint L0
      #58's "Enforced by integration `PostureBootPiiHookPresenceContractIT` ...
      class FQN locked here per Rule R-C.a" — a D3 enforcer-citation misread as
      an L8 test inventory because the enforcing test is an `*IT`, not an
      `*ArchTest`. Two distinct helpers, one root cause. NOT a content defect:
      the L0/L1 corpus was already clean (the cleanup waves did their job); the
      probes were too blunt to recognise delegation.
    surfaces:
      - gate/lib/check_l2_detail_sink.py (delegation-pointer + wire-pointer guards; dated-grandfather integration)
      - gate/lib/check_layer_purity.py (D3 enforcing-test-citation carve-out)
      - gate/check_architecture_sync.sh (Rule 145 changed-files-blocking wiring)
      - docs/governance/layer-purity-temporary-violations.yaml (LPV-l0-shipped-subset-test-inventory)
      - docs/governance/rules/rule-G-27.md
    prevention_rules:
      - "Rule G-27 / Rule 145 (enforcers E194 + E195) — the two layer-purity helpers carry the delegation-vs-leak discriminators in code: E195 a delegation-pointer guard (explicit delegation cue + a contract/L2/fact/ADR home in the bullet neighbourhood) + a wire-pointer guard (a wire_format match co-citing its own contract/ADR/enforcer is a reference) + the SAME dated grandfather list E194 honours; E194 a D3 enforcer-citation carve-out (a constraint naming its single locked enforcing test via an 'Enforced by ... per Rule R-C.a' clause is defensible even when the test is an *IT, while a genuine multi-test inventory table/bullet still leaks)."
      - "Promotion discipline (this wave): when promoting an advisory altitude/layer gate to a blocking rung, FIRST run it blocking against the live corpus and CLASSIFY every finding as (a) genuine leak -> migrate, (b) delegation pointer / mechanism citation -> teach the probe the shape, or (c) known-but-unmigrated debt -> dated grandfather row; NEVER weaken the probe's leak detection to pass. The anti-overreach self-test (a genuine leak with no delegation cue still fails closed) is mandatory alongside each new guard so the guard cannot silently blanket-disable detection."
      - "Self-test parity (Rule 89 / G-5.b): each guard + carve-out ships positive AND negative fixtures (delegation pointer passes; disclaimer passes; grandfathered leak tolerated; genuine leak still fails; D3 citation passes; multi-test inventory still fails) so a future regression that re-blunts a probe is caught by the gate self-test harness."
    cleanup_status: structurally_addressed
    open_residual: |
      The changed-files-blocking rung is clean: both helpers exit 0 on the W15
      changed L0/L1 set (0 active findings; E194 51 grandfathered, E195 7
      grandfathered) and the six new self-tests pass. The guards are the
      structural fix for the leak-vs-pointer boundary at this rung. Residual:
      the TERMINAL full-blocking rung is NOT yet clean — 23 E194 findings remain
      in the L1 feature-catalog / module-README corpus (architecture/docs/L1/**/
      features/*.md + */README.md) that the W12-W15 module-root + 4+1 cleanup
      did not touch; promoting Rule 145 to full-blocking per ADR-0159 §9 requires
      draining or grandfathering those first. The delegation guards are
      deliberately conservative (explicit cue + home, bounded ±2-line window);
      a future leak phrased to mimic a delegation pointer without a real home
      would still be caught (no home reference -> not suppressed), but the guard
      library is regex and a sufficiently adversarial author could construct a
      borderline line — the dated grandfather list remains the sanctioned
      tolerance and the full-corpus advisory scan remains the backstop.

  - id: F-ratchet-promotion-without-dated-baseline
    title: An Advisory Gate Promoted to Changed-Files-Blocking on a Corpus Carrying Historical Findings Hard-Blocks the Whole Corpus Without a Dated Baseline Allow-List
    first_observed_rc: progressive-learning-curve-remediation-W22-2026-05-30
    last_observed_rc: progressive-learning-curve-remediation-W22-2026-05-30
    occurrences: [progressive-learning-curve-remediation-W22-2026-05-30]
    root_cause: |
      A ratchet gate (advisory -> changed-files-blocking -> full-blocking) whose
      changed-files rung RE-SCOPES the whole corpus on any shared-surface change
      cannot be promoted to changed-files-blocking on a corpus that still carries
      KNOWN historical findings without ALSO landing a dated baseline allow-list
      that freezes those findings — or the promotion hard-blocks the entire
      corpus the moment a shared authoring surface is touched (which the promotion
      commit itself does). The review's own §13.3 ratchet defines the middle rung
      as "block NEW violations in changed files" (historical debt waits for
      full-blocking), so a changed-files rung WITHOUT a baseline tolerance for the
      historical findings does not actually implement the rung it claims — it
      behaves as a premature full-blocking against any branch that edits a shared
      surface. Observed 2026-05-30 (W22) promoting Rule 147 / G-30 / E197
      (feature_readiness) advisory -> changed-files-blocking: the corpus carried
      39 advisory findings on shipped FunctionPoints (33 evidence-axis +
      6 decision-axis: 11 internal-channel shipped FPs seeded with structural +
      decision identity but never wired with saa.contract_op_refs /
      saa.code_entrypoint_refs / saa.test_refs, and 2 FPs citing an ADR whose
      normalized view does not exist / is a remediation_record). Because this very
      branch had edited function-points.dsl / engineering-frames.dsl /
      features.dsl / the policy file (the shared scope surfaces), a naive flip to
      `--mode changed-files-blocking --base origin/main` re-scoped ALL 18
      FunctionPoints and BLOCKED on all 39 findings — the promotion wave's own
      gate would have been RED. The sibling layer-purity gate (Rule 145 / G-27)
      had already solved exactly this with docs/governance/layer-purity-temporary-
      violations.yaml (a dated grandfather allow-list); feature-readiness had no
      such mechanism. Distinct from F-layer-gate-flags-delegation-pointer (a probe
      too blunt to tell a leak from a delegation pointer — a precision defect):
      here the findings are GENUINE (the evidence really is not wired), the defect
      is the MISSING tolerance machinery for honestly-recorded historical debt at
      the changed-files rung. Distinct from F-numeric-drift (a baseline-count
      lockstep defect): this is a gate-BEHAVIOUR defect (the rung blocks more than
      it should), though the fix does move one baseline.
    surfaces:
      - gate/lib/check_feature_readiness.py (dated-baseline loader + changed-files-mode toleration + expiry NOTE)
      - docs/governance/feature-readiness-baseline.yaml (the dated allow-list; FRB- rows; per-row sunset_date)
      - gate/check_architecture_sync.sh (Rule 147 changed-files-blocking wiring)
      - gate/test_architecture_sync_gate.sh (rule_147_feature_readiness_baseline_scope_neg)
      - docs/governance/rules/rule-G-30.md
    prevention_rules:
      - "Promotion discipline (this family): before promoting an advisory altitude/readiness/lane gate to changed-files-blocking, run it blocking against the live corpus, and for every pre-existing finding choose (a) discharge it now, or (b) freeze it in a dated baseline allow-list (sibling of layer-purity-temporary-violations.yaml) keyed to the finding's stable identity with a per-row sunset_date. NEVER promote a re-scoping changed-files rung on a corpus with un-baselined historical findings — the promotion commit edits a shared surface and self-blocks the whole corpus."
      - "Baseline allow-list invariants (Rule G-30 / check_feature_readiness.py): the list is OPTIONAL (absent => tolerate nothing) but, when present, MUST parse or the gate fails closed (a malformed allow-list never silently suppresses); it is honoured ONLY in changed-files-blocking (full-blocking ignores it — the terminal posture demands a clean corpus); a structural-lie finding (the ownership invariant) is NEVER baselinable; every row carries a sunset_date and an expired-but-unmatched row is flagged for removal (a NOTE) to keep the list honest. Mirrors the Grandfather-Lists-Need-Sunset discipline."
      - "Self-test parity (Rule 89 / G-5.b): the promotion ships a git-scratch ratchet self-test proving the rung blocks an UN-baselined finding (rc 1), tolerates a STILL-OPEN baseline row (rc 0, BASELINED), and blocks again on an EXPIRED row (rc 1); plus python unit tests for absent-file (tolerate-nothing), open-row toleration, expiry, full-blocking-ignores-baseline, malformed-fail-closed, and ownership-never-baselined. A future regression that drops the baseline check or makes it suppress full-blocking is caught by the harness."
    cleanup_status: structurally_addressed
    open_residual: |
      The changed-files-blocking rung is clean: feature_readiness exits 0 on the
      W22 corpus vs origin/main (all 39 historical findings BASELINED by the 39
      FRB- rows; 0 blocking) and the new self-test + 6 python baseline tests pass.
      The dated allow-list is the structural fix for the historical-debt tolerance
      at this rung. Residual: the allow-list is debt, not a destination — the
      TERMINAL full-blocking rung is NOT yet reachable (it ignores the baseline and
      would block on all 39). Promoting Rule 147 to full-blocking per ADR-0159
      §13.3 requires draining the list first: the 6 decision-axis rows
      (sunset 2026-07-31) by authoring the missing normalized ADR views
      (ADR-0020 / 0027 / 0056 / 0058) or re-pointing FP-RUN-STATE-TRANSITION off
      the ADR-0118 remediation_record, and the 33 evidence-axis rows
      (sunset 2026-08-31) by extracting the entry/test/(contract) facts over the
      real handlers and wiring the saa.*_refs onto the FunctionPoint elements. The
      list is closed (no NEW shipped FunctionPoint may be added — it must satisfy
      every axis at authoring time); the sunset dates are the forcing function.
