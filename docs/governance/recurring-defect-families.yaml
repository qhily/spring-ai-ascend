      - docs/governance/rules/*.md card kernels
      - agent-*/ARCHITECTURE.md body text
      - docs/logs/reviews/*.md (design proposals + 4+1 view drafts)
      - docs/L1/**/*.md (per-view files when populated)
    prevention_rules:
      - Rule 99
      - Rule 108
      - "ADR-0138 §3 red-line c (rc53 — state-diagram annotation requirement on every deferred-transition arrow)"
      - "rc55 W3/W4/W5 view-authoring discipline — every diagram + every prose paragraph flanking a deferred-clause citation MUST carry an explicit `(WN-deferred: <cause>)` marker"
      - "candidate gate-rule for Wave 5+ — Grep `docs/L1/**/*.md` + `agent-*/ARCHITECTURE.md` for present-tense terminal verbs (`transitions to`, `is cancelled`, `consumes`, `is suspended`) within ±5 lines of a deferred-clause citation (Rule X.<letter> mentioned in `docs/CLAUDE-deferred.md`); FAIL if found without `(WN-deferred)` marker"
    cleanup_status: monitoring
