    root_cause: |
      Numeric claims (rule counts, gate counts, enforcer counts, graph
      nodes/edges, self-tests) are estimated when a release note is written
      and then never re-aligned against live state. The first estimate
      becomes a de-facto baseline; subsequent drift compounds until a
      reviewer catches it. The structural fix landed in rc6 (Rule 82 single
      source) and was widened in rc9 (Rule 91 baseline-match-manifest),
      rc10 (Rule 97 release-note numeric truth), rc12 (Rule 101 namespace
      authority parity), and rc14 (Rule G-8.a graph baseline parity). A
      re-baseline ritual at release time would close the family. pr57
      surfaced a NEW vector: a contributor PR forked from a stale main
      and recomputed baselines against the fork's base, claiming 133 gate
      rules / 238 self-tests when live-on-merge-target was 135 / 226. The
      prevention rules catch doc-vs-baseline disagreement but NOT
      baseline-computed-against-the-wrong-tree — that requires recomputing
      every count against the merge target (current main), not the fork's
      branch point. rc37 added a markdown-LAYOUT vector: a README readability
      reflow split the gate-checked baseline phrase `135 active gate rules`
      across two physical lines, defeating Rule 27's line-oriented grep even
      though the number was correct — the count was right but the line-wrap
      hid it. Lesson: each of the four README baseline-count phrases MUST stay
      on one physical line. rc39 closed the release-time estimate vector by
      requiring the formal release note to copy metric values from a generated
      evidence bundle; Maven tests moved 383→409 and gate self-tests 226→239
      only after WSL evidence extraction, not hand-authored release prose.
      rc40 adds a corrective-design vector: prevention gates added for proposal
      scope/package/absolute-claim truth changed live baselines
      (gate rules 135→138, self-tests 239→245, enforcer rows 168→171), so the
      release ledger, gate README, generated rule corpus, and architecture-status
      baselines had to move together.
    surfaces:
