      - architecture/generated/rules.dsl (Element-count header + emitted rule rows must match the status:active rule cards; W8 regen-lag vector)
      - gate/always-loaded-budget.txt (architecture-graph.yaml byte-budget ceiling; Rule 70 / E100 fails when the regenerated graph exceeds it — adding graph nodes shifts this surface alongside the node/edge count baselines; W11 byte-budget vector; AGENTS.md=10000 + CLAUDE.md=10000 entry-doc ceilings, W25 vector — editing an always-loaded entry doc may breach its byte ceiling)
      - docs/governance/templates/readme-root.md.j2 (README.md render seed, Rule G-13.b / Rule 126; editing README.md without syncing this verbatim seed fails template_render_idempotency; W25 vector)
    prevention_rules:
      - Rule 82
      - Rule 91
      - Rule 97
      - Rule 101
      - Rule G-8.a
      - Rule G-13 (rc42 W0 / ADR-0119) — forward-prevention link; W3 (release notes) + W6 (root ARCHITECTURE.md) + W8 (README.md / gate/README.md) render the drifting numeric claims from authority surfaces, closing this family for the migrated surfaces by construction. W25: Rule G-13.b / Rule 126 / E174 also catches the inverse break — a render OUTPUT (README.md) hand-edited without its .md.j2 seed.
      - Rule 70 / E100 (always-loaded byte budget) — an entry doc (README/CLAUDE/AGENTS) edited past its ceiling fails the budget gate; W25 resolves it by trimming the file, not raising the ceiling, when the growth is duplicated prose.
    cleanup_status: partial
    open_residual: |
      rc16 P2-1 surfaced lingering drift. First-cut estimates still happen
      without a structured re-baseline ritual; the next missed surface
      will appear in the first authority doc not yet covered by Rules
      82/91/97/101/G-8.a. The rc50 supplemental release kept the canonical
