  - id: F-discriminator-naming-drift-doc-vs-code
    title: Doc-Cited Enum / Method / Type Name Drifts From Java Source of Truth
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      Active doc surfaces (L1 view files, ADRs, review responses, contract
      catalogs, module ARCHITECTURE.md files) cite enum variants / method
      signatures / type names that disagree with the Java source — wrong
      case, truncated, wrong arity, wrong parameter type, or a name from
      an older naming wave. The doc lies to readers; gate-time path-truth
      rules (G-2.c) catch path drift but not name-form drift inside
      otherwise-resolvable references. The 2026-05-27 audit found 4
      distinct sub-shapes: (a) SuspendReason 3-name table at
      2026-05-22-...response.en.md:141 claims AwaitChildRun /
      AwaitToolResult / RequiresApproval while Java permits AwaitChild /
      AwaitExternal / AwaitApproval (per user precedence the DOC wins →
      Java rename); (b) SuspendReason.AwaitChildren plural in
      docs/L1/agent-service/process.md:171 and scenarios.md:83,85 vs Java
      singular AwaitChild; (c) RunRepository.updateIfNotTerminal(tid,
      runId, lambda) 3-arg signature cited in 6 lines of process.md and 3
      lines of physical.md vs actual 2-arg Java signature (PR77-P1-2);
      (d) HookPoint.before_tool lowercase + truncated cited in 5 doc
      sites vs Java HookPoint.BEFORE_TOOL_INVOCATION
      SCREAMING_SNAKE_CASE + full suffix. None of these drifts trip Rule
      G-2 path-truth because the type/method itself resolves — only the
      literal name is wrong.
    surfaces:
      - docs/L1/**/*.md
      - docs/logs/reviews/*.md
      - docs/adr/*.yaml
      - docs/contracts/contract-catalog.md
      - agent-*/ARCHITECTURE.md
    prevention_rules:
      - "candidate gate-rule W5+ — for every HookPoint.<value> or SuspendReason.<value> or RunStatus.<value> or RunRepository.<method>( mention in active md/yaml, parse the Java type by codegraph_node and FAIL if the literal name does not match a declared member / method"
    cleanup_status: incomplete
    open_residual: |
      PR77-P1-2 (updateIfNotTerminal 3-arg-in-docs vs 2-arg-in-Java),
      PR76-IF-DRIFT-004, AUD-EVT-1 (SuspendReason 3-name drift), AUD-EVT-3
      (HookPoint.before_tool case + truncation), SBL-NAME-1
      (SuspendReason.AwaitChildren plural), SBL-NAME-2 (3 doc-only
      SuspendReason names that don't exist as Java types). Closure
      requires the per-symbol name-form gate-rule candidate above to
      materialize as Rule W5-1 (or equivalent) so that any
      <JavaType>.<member> mention in active md/yaml is parsed and
      verified against the codegraph at gate time.
      2026-05-28 review: docs/logs/reviews/2026-05-28-agent-service-m1-m6-design-draft.cn.md
      and docs/logs/reviews/2026-05-28-agent-service-design-self-audit.cn.md are design-only
      proposal documents (proposal_status: draft) that do not cite Java enum variants,
      method signatures, or type names — they describe module responsibilities and data
      contracts at the conceptual level. No code-level discriminator naming to drift. Files
      are NOT instances of this defect.

  - id: F-dfa-without-validator
    title: Documented State-Machine DFA Ships Without an Enforcement Validator
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      A state-typed field (e.g. Task.A2aState, Session.Status) has a
      documented DFA — Mermaid stateDiagram, ADR transition table,
      contract yaml transitions: block — that names specific illegal
      transitions (e.g. SUBMITTED → COMPLETED is illegal). The Java side
      ships the enum + the entity but no <Type>StateMachine.validate(from,
      to) class wired into the persistence write path. The analogous
      RunStateMachine exists and proves the pattern is achievable; the
      sibling DFA is unguarded — illegal transitions silently succeed
      because no code rejects them. Adjacent to F-half-built-state-machine
      (which is about UNREACHED enum members) but distinct: here ALL
      members are reachable but the EDGES between them are not gated.
    surfaces:
      - agent-*/src/main/java/com/huawei/ascend/service/*/spi/*.java
      - agent-service/src/main/java/com/huawei/ascend/service/runtime/runs/Run.java
      - docs/L1/**/*.md
      - docs/contracts/*.v1.yaml
    prevention_rules:
      - "candidate gate-rule W5+ — for every Mermaid stateDiagram-v2 block in docs/L1/**/*.md referencing a Java enum, codegraph_search for validate(<EnumName>...) in the same module; FAIL if zero results"
    cleanup_status: incomplete
    open_residual: |
      AUD-EVT-5 (Task.A2aState 5-state DFA has no Task.A2aStateMachine or
      equivalent validator class wired into TaskStateStore.save),
      SBL-DFAW-2 (Task.TaskKind structural discriminator with no routing
      validator — borderline). Closure requires either adding the
      validator OR explicitly marking the entity Javadoc as (design_only
      — W3+ state validation deferred).

  - id: F-create-path-not-enrolled-in-dedup-tx
    title: Resource-Create Path Bypasses the Idempotency-Claim Transaction
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      An HTTP endpoint (or orchestrator) creates a top-level or child
      resource with new T(UUID.randomUUID(), ...); repository.save(t);
      while the surrounding request bears an Idempotency-Key header (or
      the suspend/resume signal carries a parentNodeKey). The dedup-claim
      row is written by a filter / pre-step in a different transaction;
      the create happens unconditionally if the claim returns fresh. A
      TTL re-claim or suspend-resume re-entry produces a duplicate
      resource under a fresh UUID — the contract guarantee successful
      claim implies at-most-one resource is violated silently. Identified
      at top-level POST /v1/runs (RunController.java:101) AND child-run
      spawn inside SyncOrchestrator.executeLoop (line 204: UUID.randomUUID()
      immediately followed by runs.save(new Run(...)) with no idempotency
      derivation from parentRunId + parentNodeKey).
    surfaces:
      - agent-service/src/main/java/com/huawei/ascend/service/platform/web/**/*Controller.java
      - agent-service/src/main/java/com/huawei/ascend/service/runtime/orchestration/inmemory/SyncOrchestrator.java
      - agent-service/src/main/java/com/huawei/ascend/service/platform/idempotency/IdempotencyHeaderFilter.java
    prevention_rules:
      - "candidate gate-rule W5+ — codegraph_callers on IdempotencyHeaderFilter.claimOrFind; for each calling endpoint, walk callees for .save( invocations on RunRepository / TaskStateStore / SessionRepository and FAIL if the save is not transactionally enclosed (no @Transactional propagation, no deterministic-uuid derivation)"
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-4 (top-level Run create non-atomic with idempotency claim),
      AUD-IDEM-5 (child Run spawn uses fresh randomUUID — parent retry
      duplicates children). Closure requires either deterministic-UUID
      derivation (uuidV5(tenantId, idempotencyKey) for top-level,
      uuidV5(parentRunId, parentNodeKey) for child) OR enrolling the
      create into the same @Transactional boundary as the
      IdempotencyStore.claimOrFind call.

  - id: F-vocabulary-identity-collision
    title: Two Same-Named Java Types Live in Different Packages of One Module
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      Two record (or class / interface) declarations share the same
      simple name in different sub-packages of one Maven module; one is
      the live carrier, the other is dead-code / pre-rename leftover.
      Both javadocs cite the same ADR authority. The catalog / SPI
      Appendix points reviewers at the wrong file; a future contributor
      importing by IDE-completion picks the wrong one. Distinct from
      F-deleted-module-name-leakage (cross-module) and from
      F-authority-surface-path-drift (correct module, wrong path) — here
      the module is right but the basename is doubly resolved within the
      module. Surfaced 2026-05-27 by two IdempotencyRecord types in
      agent-service: service.platform.idempotency.IdempotencyStore.IdempotencyRecord
      (live; 8 fields including status / responseStatus / responseBodyRef
      / expiresAt) and service.runtime.idempotency.IdempotencyRecord
      (dead; 2 fields runId / claimedAt; zero importers). spi-appendix.md
      :59 cites the second as contract-spine per ADR-0057, but ADR-0057
      §2 only declares the platform-package record.
    surfaces:
      - agent-*/src/main/java/com/huawei/ascend/**/*.java
      - docs/L1/**/spi-appendix.md
      - docs/contracts/contract-catalog.md
    prevention_rules:
      - "candidate gate-rule W5+ — for each Maven module, glob src/main/java/**/*.java → extract basenames → FAIL on any duplicate basename; allowlist file for legitimate cases (e.g. package-info.java)"
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-8 (two IdempotencyRecord types in agent-service). Closure
      requires deleting the dead service/runtime/idempotency/IdempotencyRecord.java
      OR moving the live platform record into runtime/idempotency/ per
      whichever package the audit decides is canonical (ADR-0057 §2 names
      the platform package; this audit leaves the location as-is and
      deletes the dead duplicate).

  - id: F-cross-authority-tenant-scope-claim-without-field
    title: Authority Surface Claims a Tenant-Scope Field That Does Not Exist on the Carrier Java Type
    first_observed_rc: audit-2026-05-27
    last_observed_rc: audit-2026-05-27
    occurrences: [audit-2026-05-27]
    root_cause: |
      docs/contracts/contract-catalog.md (or agent-*/ARCHITECTURE.md §SPI
      Appendix) declares a structural carrier as tenant-scoped via tenant
      resolved by <Carrier>.tenantId field (Rule R-C.c) — but the named
      field does NOT exist on the carrier record. The honest Java javadoc
      admits tenant resolution is out-of-band (e.g. via a Transport
      registry binding at the wrapping Run boundary), creating a direct
      lie between the catalog row and the type. Rule G-8.e enforces
      structural-carrier package-and-class existence but not field-level
      claims. Sibling of F-design-artifact-omits-tenant-spine (which is
      about diagrams ELIDING tenantId); here the diagram / catalog
      ASSERTS a tenantId that isn't there. Surfaced 2026-05-27 by
      contract-catalog.md:90 claiming S2cCallbackEnvelope.tenantId field
      while the Java record at
      agent-bus/src/main/java/com/huawei/ascend/bus/spi/s2c/S2cCallbackEnvelope.java:26-35
      has 8 components and NONE is tenantId.
    surfaces:
      - docs/contracts/contract-catalog.md
      - agent-*/ARCHITECTURE.md
      - docs/L1/**/spi-appendix.md
    prevention_rules:
      - "candidate gate-rule W5+ — parse contract-catalog.md rows matching tenant-scoped.*<Carrier>.tenantId → resolve <Carrier> via codegraph_node → FAIL if the type has no tenantId record component / field"
    cleanup_status: incomplete
    open_residual: |
      AUD-EVT-6 (contract-catalog.md:90 claims S2cCallbackEnvelope.tenantId
      field that does not exist; preferred fix is to ADD the field to the
      Java record per Rule R-C.c, alternative is to rewrite the catalog
      row to tenant resolved out-of-band via S2cCallbackTransport registry
      binding at wrapping Run boundary, per ADR-0074 §Consequences).
      Closure also requires re-sweep of every other tenant-scoped row in
      contract-catalog.md to verify field existence.

  - id: F-architecture-authority-fragmentation
    title: "L1 feature/function-point inventory fragmented across multiple authority surfaces"
    first_observed_rc: pre-rc55
    last_observed_rc: progressive-learning-curve-remediation-W14-2026-05-30
    occurrences: [pre-rc55, rc55, progressive-learning-curve-remediation-W12-2026-05-30, progressive-learning-curve-remediation-W13-2026-05-30, progressive-learning-curve-remediation-W14-2026-05-30]
    root_cause: |
      L1 capability + function-point semantics split across
      docs/governance/architecture-status.yaml#capabilities, L1 prose
      (agent-*/ARCHITECTURE.md), the legacy
      docs/governance/architecture-graph.yaml capability nodes, and
      L2 docs. AI sessions had to load 5+ files to reason about one
      feature, and adding a new feature required hand-editing N
      authority surfaces in lockstep — the recurring "cross-authority
      parity" sweep family. The same fragmentation shape recurs as
      ALTITUDE fragmentation: one concern's authority split across
      layers, with L0/L1 structural prose duplicating the L2/contract/
      generated-fact detail it claims to delegate (the adjudicated
      layer-purity verdict). W12 drained the L0 half; W13 drained the
      L1 agent-service half; W14 drained the remaining L1 domain modules
      (agent-bus / agent-execution-engine / agent-middleware).
    surfaces:
      - docs/governance/architecture-status.yaml#capabilities
      - agent-*/ARCHITECTURE.md
      - docs/L1/agent-service/*.md
      - architecture/docs/L1/agent-service/*.md
      - architecture/docs/L1/agent-execution-engine/*.md
      - architecture/docs/L1/agent-middleware/*.md
      - architecture/docs/L1/agent-bus/ARCHITECTURE.md
      - docs/governance/templates/agent-*-architecture.md.j2 (render seeds, Rule G-13)
      - architecture/docs/L2/run-http-contract/*.md
      - docs/governance/layer-purity-temporary-violations.yaml
      - docs/governance/architecture-graph.yaml (capability nodes)
    prevention_rules:
      - "Rule G-1.b (Architecture Workspace Truth; amended W5 per ADR-0147)"
      - "architecture/features/function-points.dsl as the single L1 function-point registry (W2)"
      - "architecture/features/capabilities.dsl as the single L1 capability registry (W2, mounted from yaml; yaml sunset at W6.c)"
      - "gate/check_architecture_workspace.sh blocking-mode profile validator + idempotent generated zone (W5+)"
      - "tools/architecture-workspace/.../fragment/AllFragmentsCli — programmatic mounting of YAML authorities into architecture/generated/ to prevent dual-authoring drift (W3)"
      - "Rule 145 / kernel Rule G-27 / enforcers E194-E195 (layer-purity advisory gate) + the dated docs/governance/layer-purity-temporary-violations.yaml allow-list — bound the ALTITUDE-fragmentation variant: structural L0/L1 prose may not duplicate L2/contract/generated-fact runtime detail; every tolerated residual carries a sunset_date (ADR-0159 §7+§9)"
    cleanup_status: closed
    open_residual: |
      W6 sub-waves (a/b/c/d) and W7 retirements are gated by post-W5
      soak (8.5-week wall-clock). The PREVENTIVE structure is in place;
      the legacy yaml authority surfaces remain operational during the
      soak window and lose authority status only when W6.a..W6.d soak
      clean.
      ALTITUDE-fragmentation variant (layer-purity verdict): W12 drained
      the four verdict-named L0 leaks; W13 drained the L1 agent-service
      half — the L2/code detail (idempotency hash/SQL, runs-API status
      matrix, filter-chain ordering, cancel-CAS method chain + race
      sequence, RunStatus annotated DFA, the StatelessEngine SPI
      signature) moved out of the agent-service 4+1 views into the active
      L2 sinks (architecture/docs/L2/run-http-contract/{logical,process,
      development}.md) + the generated facts, leaving only structural
      layer/aggregate/SPI-boundary identity + obligation-level delegation
      at L1. Six fully-cleared rows were pruned from
      layer-purity-temporary-violations.yaml (advisory E194 confirms
      zero residual leak in those file+category cells); the agent-service
      rows that remain tolerate a DEFENSIBLE residual the regex cannot
      distinguish (a process-view section heading naming a flow, a
      Boundary-Contract delegation pointer naming the migrated detail, an
      obligation-level "RLS policy required"). W14 then drained the three
      remaining L1 domain modules: the agent-execution-engine
      dispatch-and-fail outcome chain (engine_type=X -> EngineMatchingException
      -> Run.FAILED) and the agent-middleware "= registration order"
      hook-ordering mechanism moved out of the module-root + 4+1 views into
      the engine-envelope.v1.yaml / engine-hooks.v1.yaml contracts + the
      per-view process narratives, and agent-bus/ARCHITECTURE.md was
      re-grounded on boundary identity + an L2/engine-port-boundary/ pointer.
      The W7 module-ARCHITECTURE.md render seeds
      (docs/governance/templates/agent-{bus,execution-engine,middleware}-architecture.md.j2,
      l1_architecture loader = plugin_noop so render(seed) == output) were
      synced byte-identical so Rule G-13 holds. Two fully-cleared rows were
      pruned (LPV-l1-engine-strict-matching-outcome,
      LPV-l1-middleware-hook-ordering); advisory E194 confirms zero residual
      leak in any bus/engine/middleware module-root or 4+1 view file, and the
      24-finding advisory total is unchanged (the new active per-view content
      is leak-free; the two pruned rows suppressed no live leak). Remaining
      altitude debt: the six open L0 rows (sunset 2026-06-30) and the
      agent-service spi-appendix / features L1 rows (sunset 2026-08-31).

  - id: F-hand-authored-factual-drift
    title: "Hand-authored factual fields (devPaths, test FQNs, verification commands, SPI counts) drift from code/contracts/tests"
    first_observed_rc: rc5
    last_observed_rc: progressive-learning-curve-remediation-W2
    occurrences: [rc5, rc7, rc12, rc14, rc15, rc17, rc18, rc19, rc35, rc40, rc48, rc54, rc55, post-W5-L1-feature-registry, progressive-learning-curve-remediation-W2]
    root_cause: |
      Factual claims about code shape (saa.devPaths, saa.verificationTestFqns,
      saa.verificationCommands, saa.sourceFile, contract-catalog SPI counts,
      ModelGateway authority text, root ARCHITECTURE.md module counts) are
      hand-authored as prose or DSL string properties. The code that owns
      these facts (Java SPI interfaces, OpenAPI operations, test classes,
      pom.xml module list) moves on its own cadence. Without a
      deterministic extractor binding the two, the hand-authored layer
      drifts on every refactor — F-numeric-drift recurred 14+ times rc5
      through rc40; F-deleted-module-name-leakage required two waves of
      sweeping; the 2026-05-27 expert review for L1 Feature Registry
      identified the same pattern at the function-point / FEAT- level
      (function-points.dsl carries only thin metadata; features.dsl
      hand-authors test FQNs that should resolve from a test extractor).
    surfaces:
      - architecture/features/features.dsl (saa.devPaths, saa.verificationTestFqns, saa.verificationCommands, saa.cardPath, saa.primaryPackage on the re-tagged agent-service frames)
      - architecture/features/engineering-frames.dsl (saa.cardPath on all frames, saa.primaryPackage on shipped frames — hand-authored package roots until the frame fact extractor lands)
      - architecture/features/function-points.dsl (thin metadata; no code/test/contract refs)
      - architecture/features/verification.dsl (saa.sourceFile hand-authored)
      - docs/contracts/contract-catalog.md (SPI count + ModelGateway authority drifts)
      - root README.md / gate/README.md baseline metric blocks
      - root ARCHITECTURE.md module-count + path claims
    prevention_rules:
      - "Rule G-13 (Single-Source Rendering Coherence) — closes the *rendered* surface for derived YAML/Markdown"
      - "Rule G-15 (Fact-Layer Integrity, ADR-0154) — closes the *extracted* surface for generated facts under architecture/facts/generated/"
      - "architecture/profile/saa-property-authority.yaml — classifies every saa.* key as intent / factual_generated / factual_hand_authored_grandfathered (with sunset date 2026-07-31 for the third bucket); progressive-learning-curve-remediation W2 registered saa.cardPath + saa.primaryPackage in this bucket"
      - "tools/architecture-workspace/.../facts/ — Java extractors ship in Waves 2-5 (ModuleBuildFactExtractor, AdrFactExtractor, RuntimeConfigFactExtractor, ContractFactExtractor, CodeSymbolFactExtractor via ASM + JavaParser, TestInventoryFactExtractor); the future EngineeringFrameFactExtractor (ADR-0161 §6 Phase 4-5) will own saa.cardPath + saa.primaryPackage"
      - "gate/lib/check_fact_layer_integrity.py — provenance + banner + LLM-no-author checks, invoked from gate Rule 131 / E179"
    cleanup_status: partial
    open_residual: |
      W1 (the Fact-Layer Round-1 PR) shipped the structural foundation:
      schema + advisory Rule G-15.a + saa-property-authority.yaml +
      ADR-0154. Real extractors land Waves 2-4; the FunctionPoint thicker
      schema lands W5; sunset of saa.devPaths / verificationTestFqns /
      verificationCommands runs W6. progressive-learning-curve-remediation
      W2 ADDED two new grandfathered hand-authored factual fields on the
      EngineeringFrame surface — saa.cardPath (all frames) and
      saa.primaryPackage (shipped frames, ADR-0161 §2) — both under the
      same sunset_date: 2026-07-31 commitment, both targeting the future
      EngineeringFrameFactExtractor. The shipped-frame saa.primaryPackage
      values were derived from architecture/facts/generated/code-symbols.json
      (not invented), but remain hand-authored until that extractor lands;
      until then the field can drift if a frame's package root is refactored.
      Until W6 ships, the legacy + new hand-authored factual fields remain in
      place; the family stays open with cleanup_status = partial. Promotion to
      `closed` requires (a) one full release cycle with zero new occurrences
      AND (b) Rule G-15.c blocking (Wave 4 ship) AND (c) the 2026-07-31 sunset
      date passing with the hand-authored fields removed (or migrated to the
      frame fact extractor for saa.cardPath / saa.primaryPackage).

  - id: F-llm-fabricated-factual-claim
    title: "Hand-authored references to code paths / FQNs / test classes / contract operations that do not exist on disk"
    first_observed_rc: Fact-Layer-Round-1-W5
    last_observed_rc: Fact-Layer-Round-3-sweep
    occurrences:
      - Fact-Layer-Round-1-W5 (4 fabricated FP refs to RunsController.{createRun,cancelRun,getRun,listRuns} + RunControllerCreateIT/CancelIT/GetIT/ListIT)
      - Fact-Layer-Round-3-sweep (11 sibling fabrications in verification.dsl + features.dsl — RunControllerCreateIT.java, RunControllerCancelIT.java, EngineRegistryTest.java, PostureBootGuardTest.java, RunsControllerIT, S2cCallbackIT, SuspendResumeIT, ChildRunSpawnIT, CancelRunCrossTenantIT, TenantClaimFilterTest, GraphMemoryStoreTest)
    root_cause: |
      Hand-authored prose / DSL / YAML references to code paths, method
      names, FQNs, test classes, ADR ids, contract operation ids, or
      schema fields that do not exist on disk. The author (human or
      LLM) writes "plausible-sounding" references without cross-
      checking against the generated fact layer. Distinct from
      F-numeric-drift (which is about stale counts) because here the
      reference is structurally invalid, not merely outdated.
      Distinct from F-kernel-vs-implementation-drift (which is about
      kernel paragraphs lagging implementation) because here the
      direction is reversed: the docs claim behaviour the code never
      had.
    surfaces:
      - architecture/features/features.dsl (saa.verificationTestFqns, saa.verificationCommands)
      - architecture/features/function-points.dsl (saa.code_entrypoint_refs, saa.test_refs, saa.contract_op_refs)
      - architecture/features/verification.dsl (saa.sourceFile)
      - architecture/docs/L1/<module>/**.md (prose tables claiming Java FQNs / OSS refs)
      - docs/governance/rules/*.md (sub-clause enforcer citations)
