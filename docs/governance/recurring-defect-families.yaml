  - id: F-recursive-prevention-irony
    title: META Prevention Rule Exhibits the Defect Class It Prevents
    first_observed_rc: rc17
    last_observed_rc: progressive-learning-curve-remediation-2026-05-29
    occurrences: [rc17, rc19, rc20, progressive-learning-curve-remediation-2026-05-29]
    root_cause: |
      A META rule whose job is preventing defect class X is itself
      vulnerable to class X. rc17 introduced Rule G-9 / Rule 111 to
      prevent F-kernel-vs-implementation-drift on recurring-defect-
      family ledgers — but reviewers found Rule 111 itself exhibited
      6/8 defect patterns (hand-edited mtime, empty-array vacuous pass,
      duplicate-field compensation, scope-vs-impl gap, prose regex
      false-positive, shallow-clone silent pass). The pattern: when
      authoring a META prevention rule, the author thinks "this rule
      catches X" without applying the rule's own discipline to the
      rule itself.
    surfaces:
      - gate/check_architecture_sync.sh
      - gate/lib/
      - gate/test_architecture_sync_gate.sh
    prevention_rules:
      - Rule 111 (rc17, hardened rc18 Wave 1 per ADR-0095, then [META]-marked rc20 Wave 1 per ADR-0097 so Rule 112 actually gates it)
      - Rule G-9 (rc17, strengthened rc18 helper extraction; rc20 Wave 1 kernel + card sync to content-diff freshness + cleanup_status status-text parity)
      - Rule 112 (rc19 Wave 1 per ADR-0096 — META-of-META gate enforcing helper-extraction discipline on [META]-marked rules; rc20 Wave 3 widens body window to next # Rule|# === boundary + accepts .py/.bash helpers)
      - Rule 113 (rc19 Wave 2 per ADR-0096 — paren reintroduction guard + migration.md completeness; closes ADV-RC18-6)
      - Rule 114 (rc19 Wave 4 per ADR-0096 — rule card filename convention gate; prevents the rc17 hyphen-vs-dot trap from recurring)
    cleanup_status: monitoring
    open_residual: |
      rc18 Wave 1 closed all 6 self-vulnerabilities on Rule 111 via
      helper extraction + 8 hardening fixes. rc19 Wave 1 promoted to
      "closed" by adding Rule 112 (meta_rule_self_application_check)
      which structurally enforces that every future [META] rule sources
      a gate/lib/check_*.sh helper. The discipline is no longer author-
      vigilance-dependent — gate-enforced. Additional rc19 Wave 1
      hardening: python yaml parser (closes ADV-RC18-4 awk injection),
      content-diff freshness (closes ADV-RC18-1 no-op commit), semantic
      date validation (closes ADV-RC18-2), refresh-signal path filter
      derived from families[].surfaces[] (closes ADV-RC18-3). rc19 Wave 5
      finalize lockstep commit reconciled baseline_metrics to live graph
      (402 nodes / 656 edges) and bumped the documentation triangle
      (status.yaml + README.md baseline line + rc18 release note frozen-
      SHA marker) in one commit per feedback_lockstep_baseline_surfaces.md.
      rc20 reopen rationale: post-rc19 review (3 independent reviewers
      converged) found Rule 112 did NOT actually gate Rule 111 because
      Rule 111 lacked the `[META]` header marker Rule 112's scan
      requires. Recursive irony moved one layer deeper rather than
      closing. rc20 Wave 1 adds [META] to Rule 111 + literal-path source
      marker comment (so Rule 112's regex matches) + sync CLAUDE.md
      G-9 kernel + rule-G-9.md card to content-diff freshness
      (eliminates the mtime/24h prose drift that survived rc18+rc19).
      rc20 Wave 1 also extends Rule 111.c parity to compare
      cleanup_status text per family-id (caught this very F-recursive
      yaml=closed-vs-md=structurally-addressed drift). Status reopened
      to `monitoring` pending 3-rc cool-down (rc20 + rc21 + rc22 with
      no recurrence) before re-promotion to `closed` — cool-down
      convention introduced in rc20 Wave 1 / ADR-0097 to prevent
      premature-closure pattern from recurring.
      rc20 Wave 3 defensive hardening: derive_signal_paths now sanitises
      surface tokens (rejects absolute paths + colon-bearing tokens, warns
      on unresolvable paths); Rule 112 body window widened from hard +80
      to next # Rule|# === boundary; helper regex widened to accept
      .bash/.py; bash -n added as CI step; Rule 114 negative fixture
      parameterised. Dead SURFACE_PREFIX_BASES removed.
      2026-05-23 scope narrowing: derive_signal_paths now excludes
      .github/workflows/ from the refresh-signal set (SIGNAL_PATH_EXCLUSION_PREFIXES).
      ADV-RC18-3 over-derived CI workflow files as G-9.b signals, so routine
      action-version bumps forced a families content-diff (false friction
      neither the kernel nor the card ever mandated). Workflows remain a
      deleted-module-name CONTENT surface (Rule G-2.1/94/98); they are simply
      no longer architecture-refresh signals.
      progressive-learning-curve-remediation (2026-05-29) recurrence — same
      mechanism, two more surface classes: a docs-only commit landing advisory
      inventories under docs/governance/ plus review logs under docs/logs/reviews/
      spuriously became a G-9.b refresh signal because (a) the Local-Plan-Path
      family (F-local-plan-path-in-active-authority) names the bare container
      `docs/governance` as a Rule G-26 CONTENT surface, and (b) many families
      name `docs/logs/reviews/*.md` as a design-doc-language CONTENT surface.
      Neither is an architecture-refresh signal (the kernel's signals are new
      ADR / baseline_metrics / new RELEASE NOTE under docs/logs/releases/ / Rule
      heading / rule card), yet derive_signal_paths re-used surfaces[] for the
      freshness signal set, forcing a vacuous content-diff on a no-op commit.
      Fix: SIGNAL_PATH_EXCLUSION_PREFIXES adds docs/logs/reviews/ + docs/reviews/
      (review/verification logs are audit-trail artifacts emitted BY review and
      remediation waves, not refresh events); a new SIGNAL_PATH_EXCLUSION_CONTAINERS
      exact-match set drops the bare authority containers product / architecture /
      docs/governance whose only refresh-bearing children (docs/adr/,
      docs/governance/rules/, docs/governance/architecture-status.yaml) are already
      explicit in BASE_SIGNAL_PATHS. All three remain CONTENT surfaces for the
      deleted-name / plan-path gates; they are simply no longer refresh signals.

  - id: F-progressive-loading-weak-enforcement
    title: CLAUDE.md Kernel Loaded but Rules Don't Fire at Work Time
    first_observed_rc: rc21
    last_observed_rc: rc39-formal-release-transaction
    occurrences: [rc21, rc39-formal-release-transaction]
    root_cause: |
      Progressive on-demand rule loading: CLAUDE.md kernel paragraphs are
      auto-loaded into every session, but full rule bodies in
      `docs/governance/rules/rule-*.md` are only fetched when Claude
      actively reads them. In practice the active read doesn't happen
      often enough during work-time — the kernel paragraph is "available"
      in context but not "attended to" when the model is reasoning about
      a specific edit. Gate-time META defences (Rule 68 kernel-card
      byte-match, Rule 110 META scope_surfaces, Rule G-9 family ledger)
      catch the symptom AT GATE TIME but cannot enforce attention AT WORK
      TIME. The user observation 2026-05-21: "现在的 claude.md 太臃肿了 ...
      渐进式加载之后，很多契约并没有严格执行" (CLAUDE.md is bloated;
      after progressive loading, many contracts aren't strictly enforced).
    surfaces:
      - CLAUDE.md kernel paragraphs (37 rule kernels + 13 principle pointers)
      - docs/governance/rules/*.md (on-demand reads)
      - docs/governance/principles/*.md (on-demand reads)
    prevention_rules:
      - ADR-0098 (rc21 — 6-phase scenario-loaded contracts)
      - Rule G-10 (parallel-Linux-scripts mandate; ensures gate runs stay fast enough for the new contract-validation overhead)
      - Rule G-11 (phase-contract rule-allocation coherence; the contract layer is self-policing)
      - .claude/skills/{design,impl,verify,commit,review}-mode.md (5 phase-entry skills)
      - docs/governance/contracts/*.md (5 phase contracts with Active Rules tables)
      - CLAUDE.md Phase Entry directive table (Track 2 dual-track loading mechanism)
    cleanup_status: closed
    open_residual: |
      rc21 ships the structural fix: phase contracts + skills + dual-track
      loading. Empirical verification of work-time enforcement requires
      observing the next several work sessions — does Claude actually
      invoke /design-mode when starting architecture work? Does the
      contract get cited during the work? rc21 release note codifies the
      hypothesis; rc22+ may re-open this family if the work-time
      behavioural change isn't observed.
      Deferred work (per ADR-0098): deep CLAUDE.md kernel shrink (move
      phase-scoped rule kernels into phase contracts; requires Rule 68
      extension to accept contract-hosted kernels), Rule 110 META
      fixtures for G-10 and G-11, marketplace plugin packaging.
      Self-review iteration on rc21 (correctness-reviewer agent against
      the diff before merge) surfaced 4 logic bugs + 2 accidental-pass
      smells in the very rules introduced this wave (Rule 114 fixture
      stale vs widened canonical regex; ADR-0098 allocation map cited
      D-3.a/D-3.b as separate rows while disk has unified D-3 card;
      README + status.yaml composition arithmetic off-by-one on R
      count; allowed_claim arithmetic stale; Rule 116 wait regex too
      permissive; test_architecture_sync_gate.sh accidental fixture
      string match). All closed in the same wave via fixture sync,
      allocation-map collapse, prose update, regex tightening, and
      exempt-list addition. Meta-lesson: structural fixes still need
      adversarial self-review before merge — the F-recursive-prevention-
      irony pattern can hide in helper logic the rule's author didn't
      themselves write.
      Post-merge-attempt CI corrective: rc21 PR #31 CI surfaced one
      more bug the local gate could not reproduce — Rule 117's
      printf-pipe-grep lookup pipeline raced with `set -o pipefail`
      on fast GitHub Actions runners; the resulting SIGPIPE truncated
      the cited-set capture, producing false-orphan FAIL on R-C.1.
      Fix in commit d297b1d: materialise cited / cards / principles
      sets to temp files via `mktemp -d`, eliminating the SIGPIPE-race.
      Meta-lesson: gate rules using shell pipelines for set lookup
      under `set -o pipefail` are timing-fragile across CI vs local
      runners — prefer materialised temp files OR associative arrays
      OR `case` pattern matching for deterministic behaviour. rc39 extends
      the same "load the right workflow at the right phase" idea to formal
      release publishing via `.claude/skills/formal-release-transaction.md`,
      a release-readiness schema, a generated evidence bundle, and a release
      validator.

  - id: F-l1-architecture-grounding-gap
    title: L1 Architecture Document Lacks Code-Mapping or SPI Enumeration
    first_observed_rc: rc17
    last_observed_rc: rc55-pr77-consistency-review-followup
    occurrences: [rc17, rc18, rc19, rc20, rc21, rc22, rc27, rc28, rc29, rc30, rc40-agent-execution-engine-readiness-corrective, rc53-wave-1-agent-service-l1-4plus1-rewrite, rc55-oss-comparison-review-followup, rc55-capability-feature-review-followup, rc55-capability-feature-scenario-followup, rc55-pr77-consistency-review-followup]
      # rc55 PR-77 consistency review wave-1 follow-up (merge-train Wave 0.2): external reviewer (yougq) found that the post-rc55 4+1 set in `docs/L1/agent-service/` still carries 7 cross-view + cross-doc grounding gaps — ERD vs prose cardinality contradiction (P1-1), method-signature drift across logical/process/physical for `RunRepository.updateIfNotTerminal` (P1-2), Task/Session PK type drift between logical ER and physical schema (P1-3), test-anchor pointing at non-existent `tenantMismatchReturns403` (P2-1), SSE marked W2-shipped vs OpenAPI W2-scope (P2-2), README frontmatter `covers_views` underclaim (P2-3), module-root `agent-service/ARCHITECTURE.md` retaining legacy `TaskRepository`/`tenantMismatchReturns403` terminology (P2-4). The first three findings (P1-1/P1-2/P1-3) seed a CANDIDATE NEW family `F-l1-view-set-internal-signature-drift` to be ratified in Wave 1A of the audit plan. Remaining four widen existing families (`F-shadow-corpus-prose-staleness`, `F-design-only-mechanism-shown-as-shipped`, `F-frontmatter-claim-body-mismatch`). Surface roster extended below to include the consistency-review file.
      # rc55 capability-feature scenario follow-up: the rewritten Agent Service module capability list still under-decomposed enterprise Agent scenarios. Human review identified missing SSE/non-SSE/direct ingress, reconnect context recovery, context compaction, long-task continuation, mid-run execution switching, rollback-to-prior-state retry, same third-party Agent recovery after interruption, client-hosted skills, sub-agent delegation, and configuration ownership for model, third-party Agent, and client information. Closed in this branch by expanding the bilingual review into AS-SC01..AS-SC24, AS-L1-F01..AS-L1-F47, and module-owned recovery/configuration matrices.
      # rc55 capability-feature review follow-up: the first generated Agent Service module capability list overfit downstream design consumption by carrying L2-facing advice, artificial status labels, priority-first grouping, and weak scenario/data/control-flow closure. Closed in this branch by rewriting the bilingual review as a module-owned, S1-S5 scenario-anchored L1 decomposition with orthogonality and OSS-average capability checks.
      # rc55 OSS comparison review follow-up: the generated bilingual review preserved the OSS comparison conclusion but dropped source-level project-by-project non-equivalence, Layer 3 worker-contract, Layer 5 capability-discovery, and Session/Memory concurrency evidence. Closed in this branch by adding the original source as a review record and expanding both generated summaries.
      # rc53 Wave 1: PR #71's L1 design draft §3.2 omits tenantId from the ER block and §3.4.1 omits cancel re-auth + atomic CAS from the state machine — both grounding gaps in an L1-class artefact. Closed at the design level by ADR-0136 + ADR-0138 + the canonical 4+1 rewrite landing across Waves 2-4.
      # rc30 CI-corrective: remove non-existent tree-block dirs (src/main/resources/ in agent-middleware; bootstrap/ in agent-service); rc32 review reopens because last_observed_rc==rc30 contradicts cleanup_status: closed.
    root_cause: |
      Rule G-1.a (Layered 4+1 Discipline) mandates that every
      architecture artefact declares level/view frontmatter, but does
      NOT enforce DEPTH or GROUNDING of the content. An L1
      ARCHITECTURE.md can be 4+1-shaped yet still fail to map
      logical components to specific package paths or enumerate the
      actual SPI surface the module ships. As of rc21 HEAD, the 6
      agent-* ARCHITECTURE.md files showed uneven grounding:
      agent-middleware lacked a Development View tree; agent-client
      and agent-evolve were skeleton-only with no SPI appendix; the
      L1 ARCHITECTURE.md SPI section was not enforced as a parity
      surface against module-metadata/catalog/DFX. rc40 reopens the family for
      `agent-service/ARCHITECTURE.md`: the development tree omitted live
      `platform/{engine,persistence,probe,resilience}` and
      `runtime/{evolution,posture}` packages while the SPI appendix counted
      structural carriers as if they were active SPI interfaces. rc55 OSS comparison
      review follow-up applies the same grounding principle to derived review
      artefacts: a summary can be structurally correct yet still unsafe if it
      strips the source evidence matrix that explains why each OSS reference is
      comparable but not substitutable. rc55 capability-feature review follow-up
      adds the sibling failure mode where a feature list is detailed-looking yet
      under-grounded because it imports downstream-design advice, status labels,
      and priority ordering before proving module ownership, scenario closure,
      data flow, and control flow. rc55 capability-feature scenario follow-up
      adds the next sibling failure: even after removing those over-designed labels,
      the list remained unsafe until it enumerated concrete enterprise Agent
      scenarios for SSE/non-SSE/direct ingress, reconnect recovery, context
      compaction, long-running task continuation/switch/retry, same third-party
      Agent recovery, client-hosted skills, sub-agent delegation, and configuration
      ownership.
    surfaces:
      - agent-*/ARCHITECTURE.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-review.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-review.en.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-oss-comparison-source.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-module-capability-feature-list.cn.md
      - docs/logs/reviews/2026-05-26-agent-service-module-capability-feature-list.en.md
      - docs/logs/reviews/2026-05-26-agent-service-l1-4plus1-consistency-review-wave-1.cn.md
