  - id: F-design-doc-language-bypasses-invariant
    title: Design Artefact Wording Implies Bypass of Reactive / RLS / No-Sleep Invariants
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite]
    root_cause: |
      Design docs use casual language ("no mandatory persistence",
      "fast-path skips checkpoint", "lightweight synchronous",
      "memory-only path") that, when read by an implementer under
      time pressure, would license bypassing Rule R-G (reactive
      I/O), Rule R-H (no Thread.sleep), Rule R-J.a (RLS on
      tenant_id tables), or Rule R-C.2 (RunRepository.updateIfNotTerminal
      CAS). The language is the upstream cause; the implementation
      bug would be the downstream effect. The family is the
      "language-as-attack-surface" sibling of the structural-defect
      families — closing the implementation surface (e.g., Rule R-G
      ArchUnit) does NOT close this family; the design wording
      must also be tightened to deny the bypass interpretation.
      PR #71 §3.4.3 Fast-Path "no mandatory persistence, local
      synchronous resume" is the surfacing event.
    surfaces:
      - docs/logs/reviews/*.md (design proposals)
      - architecture/docs/L2/*.md
      - docs/adr/*.yaml (`context:` / `decision:` blocks)
      - agent-*/ARCHITECTURE.md
    prevention_rules:
      - ADR-0139 (this wave — Fast-Path / Slow-Path narrowed semantics; explicit forbid of bypass-implying language)
      - Wave 2 Logical View narrowing prose (canonical L1 vocabulary)
      - candidate gate-rule for Wave 5+ — risk-phrase grep with same-paragraph invariant-preservation clause requirement
    cleanup_status: monitoring
    open_residual: |
      The 2026-05-22 reference template's "compact edge deployment"
      / "stateless and semi-persistence" prose is a partial sibling
      that did not trigger the strict regex but deserves an
      explicit invariant-preservation pin per ADR-0139. Deferred
      sibling, Wave 5 follow-up. The general gate-rule for risk-
      phrase + same-paragraph invariant-preservation clause is a
      Wave 5+ candidate; until landed, family relies on Per-Wave
      Acceptance Criteria sweep discipline.

  - id: F-placeholder-leaks-into-active-corpus
    title: Anonymous-Name Placeholders Leak Into Active Documentation Corpus
    first_observed_rc: rc53-wave-1-agent-service-l1-4plus1-rewrite
    last_observed_rc: pr71-agent-service-l1-review-wave-1
    occurrences: [rc53-wave-1-agent-service-l1-4plus1-rewrite, rc54-agentic-composition-corrective, pr71-agent-service-l1-review-wave-1]
    root_cause: |
      Anonymous-name placeholders (`xiaoming` 小明, `wanshoulu` 万寿路,
      `foo`, `bar`, `TBD`, `TODO-template`) leak into active design
      surfaces — file slugs, prose, code-block author tags — without
      being scrubbed before review. File slugs are particularly
      costly because they become stable URLs (PR review links,
      archive links, gh-page URLs), and post-hoc rename requires
      historical-snapshot markers + redirect strategy per
      `docs/governance/logs-folder-policy.md`. PR #71's filename
      `2026-05-25-xiaoming-agent-service-l1-review-wave-1.{en,md}` is
      the surfacing event for this family in design-doc form;
      `docs/logs/reviews/2026-05-13-{wanshoulu}-wave-N-request.md`
      is a pre-existing active-corpus leak.
    surfaces:
      - docs/logs/reviews/*.md (file slugs)
      - architecture/docs/L2/*.md
      - docs/contracts/*.yaml (`title:` / `description:` text)
      - agent-*/src/main/java/**/*.java (variable / class / package names — Java side is largely guarded by Checkstyle but slugs in `@author` comments / Javadoc examples slip through)
    prevention_rules:
      - This wave's review-draft thematic-slug rename (`agent-service-l1-4plus1-rewrite-wave-N`)
      - Rule 127 current-release/current-response placeholder guard (rc54 — rejects live `TBD`, `TODO-template`, and evidence-placeholder tokens while allowing documented family-vocabulary citations)
      - candidate broad-corpus gate-rule for Wave 5+ — `Grep "\bxiaoming\b|\bwanshoulu\b|\bTODO-template\b|\bTBD\b"` over `docs/{logs,L2,contracts,adr}/**/*.md` + `agent-*/**/*.java`, with allow-list for documented citation contexts (ADR `context:` / review-draft sibling-sweep prose)
    cleanup_status: monitoring
    open_residual: |
      The `2026-05-13-{wanshoulu}-wave-N-request.md` file remains in
      the active corpus; Wave 5 rename + historical-snapshot marker
      will close that specific leak. PR #71's `xiaoming` slug
      becomes a historical artifact after Wave 8 closure; allow-
      listed citation contexts in ADR-0136 + this wave's review
      drafts + future wave drafts are NOT family hits but require
      gate-rule allow-list maintenance. rc54 closes the current-release-note
      placeholder recurrence by replacing the rc53 Wave 8 line-count token
      and adding the Rule 127 current-release/current-response guard. PR #71's
      original `xiaoming` review slugs remain in the current contributor PR;
      the branch keeps them for URL stability while the family records the
      recurrence and future slug guards remain a W5+ candidate.

  - id: F-l1-canonical-source-in-interaction-log
    title: Live L1 Architecture Artefact Points at Freeze-Marked Review Log as Canonical Source
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An `agent-*/ARCHITECTURE.md` (L1 root per Rule G-1.a) delegates
      its "canonical 4+1 view source" to a file under
      `docs/logs/reviews/*.md`. The review file is an INTERACTION
      RECORD per `docs/governance/logs-folder-policy.md` and is
      frozen / read-only after wave closure. Promoting it to
      "authoritative L1 source" creates two compounding defects:
      (a) Rule G-1.a's L0/L1/L2 view discipline is bypassed —
      architecture lives where governance can't gate it;
      (b) the freeze-mark means the "live" architecture cannot
      evolve without writing a fresh review file + chasing the
      pointer. PR #72 rc53 surfaces the family in
      `agent-service/ARCHITECTURE.md` §0.5 which names
      `docs/logs/reviews/2026-05-26-agent-service-l1-4plus1-rewrite-wave-1.{en,cn}.md`
      as canonical. The fingerprint: any `agent-*/ARCHITECTURE.md`
      or `docs/L1/**/*.md` containing a markdown link to
      `docs/logs/reviews/.*\.md` where the words
      `canonical` / `authoritative` / `4+1 source` / `view source`
      appear within ±3 lines of the link.
    surfaces:
      - agent-*/ARCHITECTURE.md
      - docs/L1/**/*.md
      - ARCHITECTURE.md (root)
    prevention_rules:
      - "ADR-0143 (rc55 — review-log demotion + L1 canonical move; agent-service/ARCHITECTURE.md §0.5 rewritten to point at docs/L1/agent-service/{scenarios,logical,process,physical,development}.md)"
      - "candidate gate-rule for Wave 5+ — Grep agent-*/ARCHITECTURE.md + docs/L1/**/*.md for markdown links to docs/logs/reviews/.*\\.md with the proximity words {canonical, authoritative, 4+1 source, view source} within ±3 lines"
    cleanup_status: monitoring
    open_residual: |
      ADR-0143 demotes the rc53 review file and rewrites the
      §0.5 pointer; the canonical 4+1 source now lives at
      docs/L1/agent-service/ per the rc55 wave. Future review
      files MUST NOT be promoted to "canonical" status again;
      gate-rule for proximity-based detection of canonical/
      authoritative wording near review-log hyperlinks is a
      W5+ candidate. Sibling sweep across other modules
      (agent-execution-engine, agent-bus, agent-middleware,
      agent-client, agent-evolve) is run in this wave's W0
      under docs/logs/reviews/2026-05-26-agent-service-l1-sibling-sweep.en.md.

  - id: F-layer-decomposition-low-cohesion
    title: Logical-View Layer Owns Heterogeneous Responsibilities or Double-Homes With Another Layer
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A logical-view layer in an L1 architecture document either
      (a) lists ≥4 heterogeneous component types as its
      responsibilities, becoming a "kitchen-sink" layer with no
      clear ownership boundary; OR (b) shares one or more
      responsibilities with a different layer in the same diagram,
      creating undefined ownership at the layer boundary. PR #72
      rc53 surfaces both shapes in the same diagram: review §15.1
      "Engine Adapter Layer" lists 7+ heterogeneous concerns
      (EngineRegistry + ExecutorAdapter + ChatAdvisor +
      RuntimeMiddleware + ContextProjector + PromptTemplate +
      StructuredOutputConverter) AND RuntimeMiddleware appears
      again in "Task-Centric Control Layer" — double-homing.
      Symptom of treating logical-view as a free-typed prose
      surface rather than a discipline.
    surfaces:
      - agent-*/ARCHITECTURE.md
      - docs/L1/**/*.md
      - architecture/docs/L2/**/*.md
      - docs/logs/reviews/*.md (design proposals authoring L1 views)
    prevention_rules:
      - "ADR-0140 (rc55 — Engine Adapter Layer split into 5a Engine Dispatch & Execution + 5b Translation & Tool-Intercept; RuntimeMiddleware exclusively in Layer 4 Control)"
      - "ADR-0142 (rc55 — Run aggregate single-owner: Manager layer owns the aggregate; Control layer holds typed reference + invokes RunRepository.updateIfNotTerminal)"
      - "candidate gate-rule for Wave 5+ — pattern-match in agent-*/ARCHITECTURE.md + docs/L1/**/*.md for `Layer N` headings; count bullet items per layer; FAIL if ≥4 OR if same component name appears under ≥2 layers"
    cleanup_status: monitoring
    open_residual: |
      The rc53 5-layer model (Access / Manager / Queue / Control /
      Adapter) is preserved with the ADR-0140 + ADR-0142
      narrowings. A gate-rule that scans layer-description blocks
      across all L1 docs for the same family pattern is a W5+
      candidate; until then, family relies on review-time
      vigilance + the Per-Wave Acceptance Criteria sweep.
      Sibling sweep across other modules (agent-execution-engine,
      agent-bus, agent-middleware, agent-client, agent-evolve)
      runs in this wave's W0 sibling-sweep report.
      2026-05-28 review: docs/logs/reviews/2026-05-28-agent-service-m1-m6-design-draft.cn.md
      (AgentService M1-M6 L1 feature spec + weather clarification scenario) audited
      against this family's root cause. Each of M1-M6 is a single-module spec with
      a single clear layer boundary; no "kitchen-sink" layer and no double-homing of
      responsibilities detected. File is NOT an instance of this defect.

  - id: F-frontmatter-claim-body-mismatch
    title: Architecture-Doc Frontmatter Declares Views the Body Does Not Author
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An L0/L1/L2 architecture document's YAML frontmatter
      declares `view:` and/or `covers_views: [...]` that the
      document body does NOT actually author — no matching
      `## *Scenarios*` / `## *Logical*` / `## *Process*` /
      `## *Physical*` / `## *Development*` headings, no Mermaid
      diagrams for the claimed view, no per-view body content.
      The frontmatter therefore lies to the graph builder
      (`gate/build_architecture_graph.sh`) and to any L0/L1/L2
      consumer relying on frontmatter as the authoritative
      view declaration. PR #72 rc53 surfaces the family in
      `agent-service/ARCHITECTURE.md` whose frontmatter declares
      `view: scenarios` AND `covers_views: [logical, development,
      process, physical, scenarios]` while the body has no
      logical / process / physical / development view section —
      §0.5 punts every non-scenarios view to the rc53 review file.
    surfaces:
      - agent-*/ARCHITECTURE.md
      - docs/L1/**/*.md
      - architecture/docs/L2/**/*.md
      - ARCHITECTURE.md (root)
    prevention_rules:
      - "rc55 W2 frontmatter discipline — every L1 view file declares exactly one `view:` value matching its body; `covers_views:` only used on index files where the body lists each covered view as a cross-link"
      - "candidate gate-rule for Wave 5+ — for every .md with `level:` frontmatter, parse `view:` + `covers_views:` and scan body for matching view headings (`## *Scenarios*`, `## *Logical*`, ...); FAIL on any frontmatter-declared view absent from body"
    cleanup_status: monitoring
    open_residual: |
      rc55 W2 ships the structural fix for agent-service: the
      ARCHITECTURE.md frontmatter is corrected to `view: scenarios`
      + `covers_views: [scenarios]`, and the other 4 views live
      under docs/L1/agent-service/{logical,process,physical,
      development}.md, each with its own per-view frontmatter.
      The repo-wide sibling sweep in this wave's W0 audits the
      other 5 modules' ARCHITECTURE.md for the same pattern.
      Gate-rule candidate for W5+.

  - id: F-logical-vs-structural-decomposition-conflation
    title: Single Architecture Artefact Carries Two Competing N-Element Decompositions Without a Mapping
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A single architectural artefact contains TWO different
      N-element decompositions of the same scope (e.g. a
      5-layer LOGICAL decomposition and a 5-component
      PACKAGE-STRUCTURAL decomposition) without an explicit
      mapping section linking the two. Reader cannot tell which
      is canonical; implementer doesn't know which sub-package
      a "layer" maps to. Family adjacent to but distinct from
      F-cross-authority-agreement: that family is about TWO
      surfaces disagreeing; this one is about ONE surface
      carrying two un-mapped views internally. PR #72 rc53
      surfaces the family in `agent-service/ARCHITECTURE.md`:
      §11 "L1 Runtime-Role Decomposition" lists 5 components
      (Dispatcher/Orchestrator/Task/Session/Engine) per ADR-0100,
      while review §15 lists 5 layers (Access/Manager/Queue/
      Control/Adapter) per ADR-0138. Same scope, different
      decompositions, no mapping.
    surfaces:
      - agent-*/ARCHITECTURE.md
      - docs/L1/**/*.md
      - architecture/docs/L2/**/*.md
    prevention_rules:
      - "ADR-0144 (rc55 — Layer↔Package Matrix: publishes the unified mapping table; declares 5-layer model as logical-view decomposition and 5-component model as package-structural decomposition; extends ADR-0100 + ADR-0138)"
      - "candidate gate-rule for Wave 5+ — detect ≥2 distinct numbered N-table blocks (`#### 1. ... #### 5.` OR `| # | Layer/Component |`) inside the same .md without a 'logical ↔ package mapping' section between them"
    cleanup_status: monitoring
    open_residual: |
      ADR-0144 publishes the canonical layer↔package matrix.
      Future architectural artefacts that introduce a NEW
      decomposition MUST extend ADR-0144 or supersede it.
      Repo-wide sibling sweep audits the other 5 modules for
      the same pattern; if found, ADR-0144 extends to cover
      them. Gate-rule for W5+.

  - id: F-design-only-mechanism-shown-as-shipped
