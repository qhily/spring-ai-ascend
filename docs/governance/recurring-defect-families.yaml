      - Rule G-8
      - Rule G-8.e
      - Rule 107
      - Rule 108
      - Rule 109
      - Rule 122
      - Rule 123
      - Rule 124
      - Rule G-13 (rc42 W0 / ADR-0119) — forward-prevention link; single render context per surface guarantees agreement across release notes (W3), contract-catalog.md (W5), root ARCHITECTURE.md (W6), L1 ARCHITECTURE.md (W7), and CLAUDE.md rule index (W9); subsumes G-8.a/c/e in W10 cleanup.
    cleanup_status: structurally_addressed
    open_residual: |
      Every new rule MUST explicitly enumerate its authority surfaces
      (Rule G-8.b/.c/.e + Rule 109 + Rule G-9 frontmatter). Drift will
