  - id: F-discriminator-without-discriminated-type
    title: Typed Discriminator Ships Without the Polymorphic Type It Discriminates
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      A typed discriminator (enum, sealed-marker class, `*Export`,
      `*Kind`, `*Type`) is shipped in production Java, but the
      polymorphic type the discriminator was meant to label does
      NOT exist on the classpath yet. Rule enforcers that
      depend on the discriminated type become VACUOUSLY TRUE
      (the rule has no inputs to check) and silently arm for
      future drift — a reader assumes the contract is gated
      when it isn't. PR #72 rc53 surfaces the family with
      `EvolutionExport` enum at
      `agent-service/src/main/java/com/huawei/ascend/service/runtime/evolution/EvolutionExport.java`
      whose javadoc declares it the discriminator for a sealed
      `RunEvent` hierarchy that does NOT yet exist; Rule R-M.e
      "Every emitted RunEvent declares EvolutionExport" is
      vacuously true because zero `RunEvent` types exist.
    surfaces:
      - agent-*/src/main/java/**/*Export.java
      - agent-*/src/main/java/**/*Kind.java
      - agent-*/src/main/java/**/evolution/*.java
      - docs/governance/enforcers.yaml (rules referencing armed-but-vacuous discriminators)
      # Note: `*Discriminator.java` surface was originally enumerated but the rc55 W6 freshness
      # gate WARNed that the glob matched zero files; removed to avoid Rule G-9 glob-zero-match
      # warning. The fingerprint logic still covers Discriminator-named types via
      # codegraph_callers when they appear (per the family's prevention_rules block).
    prevention_rules:
      - "ADR-0145 (rc55 — Sealed RunEvent Hierarchy specification; defines the sealed variants required by S1-S5 scenarios; specifies EvolutionExport binding; promotes Rule R-M.e from vacuously true to actively gated)"
      - "docs/contracts/run-event.v1.yaml (rc55 — design_only at W1; promoted to runtime_enforced when Java sealed type lands)"
      - "candidate gate-rule for Wave 5+ — scan all `agent-*/src/main/java/**/*Export.java` + `*Kind.java` enums; use codegraph_callers to count non-self call-sites; FAIL if a discriminator has 0-1 non-self callers AND a Rule kernel claims an enforcer over its consumers"
    cleanup_status: monitoring
    open_residual: |
      ADR-0145 + docs/contracts/run-event.v1.yaml are the
      design-side closures. The actual Java sealed RunEvent
      type lands in a follow-up impl-mode wave (rc55+1 or
      later); until then EvolutionExport remains
      design_only-armed. Repo-wide sweep audits all
      `*Export.java` / `*Kind.java` / `*Discriminator.java`
      types under agent-* for the same pattern (zero-callsite
      discriminator with armed-but-vacuous enforcer).

  - id: F-spi-package-bloat-with-carriers
    title: SPI Package Contains More Structural Carriers Than Extension Interfaces
    first_observed_rc: rc55-agent-service-l1-canonical-materialization
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc55-agent-service-l1-canonical-materialization]
    root_cause: |
      An `*.spi.*` Java package contains more structural carriers
      (records / sealed / enums / value objects) than extension
      interfaces. The package's published-SPI surface count
      becomes inflated and the 4-way parity ledger (Rule R-D.e/
      .f/.g + Rule G-1.1.b) becomes confusing — carriers
      mistakenly show up as SPI rows, or are deliberately
      excluded from one surface but counted in another. Family
      adjacent to but distinct from F-l1-architecture-grounding-
      gap: that family is about the L1 doc lacking SPI
      enumeration; this is about the .spi package itself
      conflating "publish point" with "wire shape". Rule R-D.d
      explicitly mandates `*.spi.*` packages contain ONLY
      extension interfaces (carriers belong in the parent
      package), but no enforcer fires the rule at gate time.
      PR #72 rc53 surfaces the family at
      `agent-service/src/main/java/com/huawei/ascend/service/runtime/memory/spi/`
      which contains 13 types (1 root interface
      `GraphMemoryRepository` + 12 carriers — MemoryQuery,
      MemoryEntry, MemoryRef, MemoryMetadata, MemoryCategory,
      MemoryOwnership, SemanticFact, etc.).
    surfaces:
      - agent-*/src/main/java/**/spi/*.java
      - agent-*/module-metadata.yaml#spi_packages
      - docs/contracts/contract-catalog.md
      - docs/dfx/agent-*.yaml
    prevention_rules:
      - "Rule R-D.d (rc1 — `*.spi.*` package convention; mandates extension interfaces only in .spi sub-packages)"
      - "rc55 W5 SPI Appendix discipline — every .spi package audit explicitly lists `interfaces` (extension points) vs `carriers` (records/enums); carriers promoted out of .spi per Rule R-D.d"
      - "candidate gate-rule for Wave 5+ — for every `*.spi.*` package, parse public classes; count interfaces vs records vs sealed types vs enums; FAIL if (records + sealed + enums) > interfaces"
    cleanup_status: monitoring
    open_residual: |
      rc55 W5 audits the agent-service memory.spi package and
      either splits into focused sub-packages (memory.spi.read,
      memory.spi.write) OR promotes carriers out of .spi per
      Rule R-D.d. The bulk Java refactor (file moves) is
      deferred to a follow-up impl-mode wave; rc55 W5 documents
      the intended split with an ADR placeholder + `(impl
      rcNN+1)` marker. Repo-wide sibling sweep audits every
      `*.spi.*` package under agent-* for the same
      carrier-over-interface ratio.

  - id: F-half-built-state-machine
    title: Multi-State Enum Declares Lifecycle Members the Code Never Writes
    first_observed_rc: audit-2026-05-27
    last_observed_rc: dev-posture-run-execution (2026-05-28)
    occurrences: [audit-2026-05-27, dev-posture-run-execution-2026-05-28]
    root_cause: |
      An enum / sealed marker / hook-point taxonomy is declared with
      N members representing an intended lifecycle (CLAIMED →
      COMPLETED / FAILED; phase_2_fired hooks; suspend-reason placeholder
      records). The shipped code writes ≤K (K<N) of those members; the
      remaining members are aspirational / future-wave. Javadoc honestly
      admits the gap, but reviewers reading the type assume the full
      lifecycle is live. Sibling of F-discriminator-without-discriminated-type
      at the VALUE level rather than the TYPE level: there the discriminator
      ships without the polymorphic type; here the polymorphic type ships
      with values that have no producer. Surfaces at the 2026-05-27 audit
      include IdempotencyStore.Status.COMPLETED and .FAILED (only CLAIMED
      is ever written), RunStatus.EXPIRED (declared terminal but zero
      production write-paths), SuspendReason.{AwaitChild, AwaitTimer,
      AwaitExternal, AwaitApproval} (4 of 6 sealed-record variants with
      zero constructor call sites), Task.A2aState 5 values + Task.TaskKind
      4 values (entity record exists; no production write-path of any
      value), HookPoint.ON_YIELD (ships in yaml hooks list + Java enum
      but omitted from phase_2_mandatory_hooks_fired_by_orchestrator),
