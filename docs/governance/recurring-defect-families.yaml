  - id: F-terminal-verb-overclaim
    title: Active Kernel Terminal Verb vs Deferred Decision
    first_observed_rc: rc11
    last_observed_rc: rc55-agent-service-l1-canonical-materialization
    occurrences: [rc11, rc12, rc15, rc53-wave-1-agent-service-l1-4plus1-rewrite, rc55-agent-service-l1-canonical-materialization]
      # rc53 Wave 1: PR #71's §3.4.1 state diagram arrow labels use present-tense terminal verbs ("transitions to", "is cancelled") for behaviour whose Run-state transition is W2-deferred — specifically COLLABORATION suspension (Rule R-M.d.b / R-M.d.c deferred per docs/CLAUDE-deferred.md) and SAFETY_CHECK rejection (Rule R-L.b deferred). Family was previously cleanup_status: closed at rc15; rc53 Wave 1 re-opens because the closure was scoped to CLAUDE.md kernels + agent-*/ARCHITECTURE.md, not design-draft state diagrams under docs/logs/reviews/. Closed at the design level by ADR-0138 §3 red-line c (state-diagram annotation requirement) + Wave 2 cancel-race-aware Mermaid stateDiagram-v2.
      # rc55: agent-service/ARCHITECTURE.md §runtime/resilience prose reads "over-cap callers receive a rejected decision envelope `SkillResolution.reject(SuspendReason.RateLimited)` per Rule R-K shipped surface. Translating that decision into `RunStatus.SUSPENDED` is deferred to Rule R-K.c (W2 scheduler admission)" — but the surrounding paragraph uses present-tense "consumes capacity" for the rate-limited path. Reader can interpret the present-tense as "Run actually transitions SUSPENDED at W0" when only the envelope is shipped. cleanup_status bumped from `closed` (stale since rc53) to `monitoring`. Closed at the design level by rc55 W4 process view explicit `(W2-deferred: scheduler admission)` annotation per Rule R-K.c on every diagram + ADR-0140..0145 wave.
    root_cause: |
      Active rule kernels use end-state verbs ("are SUSPENDED",
      "transitions to FAILED", "consumes the * capacity") for behaviour
      whose Run-state transition is W2-deferred. The shipped Java surface
      only returns a decision envelope (e.g.
      `SkillResolution.reject(SuspendReason.RateLimited)`); the
      transition itself is deferred. Closed structurally by Rule 99 (rc11)
      + Rule 108 (rc16). Reopened at rc53 because the rc15 closure scope
      did not cover design-draft state diagrams under
      `docs/logs/reviews/`; reopened again at rc55 because the rc53
      closure scope did not cover narrative prose within
      `agent-*/ARCHITECTURE.md` that flanks deferred-clause citations.
    surfaces:
