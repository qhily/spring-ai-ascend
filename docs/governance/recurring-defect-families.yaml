      - "Component-level recurrence (2026-05-28): the AsyncRunDispatcher abstraction shipped with only the NoOpAsyncRunDispatcher producer in the running app — the orchestrating producer existed solely in RunCursorFlowIT test wiring, so POST /v1/runs never reached the SUCCEEDED write-path outside tests. Materialized for dev posture via OrchestratingAsyncRunDispatcher + Capability registry, with RunExecutionIT pinning the HTTP→orchestrator→SUCCEEDED path. The durable production producer stays deferred (ADR-0070, W2) with a posture-gated bean rather than a dateless stub."
    cleanup_status: incomplete
    open_residual: |
      AUD-IDEM-1 (IdempotencyStore.Status.COMPLETED + FAILED),
      AUD-EVT-4 (HookPoint.ON_YIELD declared in yaml but absent from
      phase_2_mandatory_hooks_fired_by_orchestrator), SBL-HBSM-1
      (RunStatus.EXPIRED), SBL-HBSM-2 (4 SuspendReason variants),
      SBL-HBSM-3 (Task.A2aState + TaskKind), SBL-HBSM-4
      (PlaceholderPreservationPolicy.WARN + REWRITE). Closure requires
      either annotating each unreached member with (W2-deferred —
      ADR-NNNN) Javadoc markers OR materializing the producer paths in
