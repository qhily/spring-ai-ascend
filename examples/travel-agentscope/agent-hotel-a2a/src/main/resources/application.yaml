# agent-hotel-agentscope-a2a — Spring Boot wrapper hosting the AgentScope-flavored
# hotel agent under agent-runtime. LLM credentials default to env vars; local
# placeholders only serve to start the JVM.
server:
  port: 8082

# A2A Agent Card 完整声明：runtime 通过 AgentCardProperties 读取后构建
# /.well-known/agent-card.json，无需在 Java 层再写 @Bean AgentCard。
agent-runtime:
  access:
    a2a:
      agent-card:
        name: hotel-planning-agentscope
        description: >-
          Corporate-travel hotel planning sub-agent (AgentScope flavor). Given a
          destination city, check-in / check-out dates and optional star / price /
          brand filters, returns a markdown comparison of recommended hotels with
          rooms and prices.
        version: "0.1.0"
        organization: spring-ai-ascend
        default-input-modes: [text]
        default-output-modes: [text]
        capabilities:
          streaming: false
          push-notifications: false
          extended-agent-card: false
        skills:
          - id: hotel_search
            name: Search hotels in a city
            description: >-
              Search hotels by city, check-in / check-out dates, optional max
              price per night, minimum star, brand whitelist and keywords
              (district / facility). Returns a ranked, paginated list.
            tags: [hotel, search, travel, corporate-travel, agentscope]
            examples:
              - "帮我找北京 6 月 18 日入住、6 月 20 日离店、四星以上、预算 800 元以内的酒店"
              - "Find a 5-star hotel near Shanghai Hongqiao for tomorrow night"
            input-modes: [text]
            output-modes: [text]
          - id: hotel_detail
            name: Get hotel details by id
            description: >-
              Given a hotelId from a prior search call, return the hotel
              header fields plus the room offer list (room name, bed type,
              area, breakfast, cancellation, RMB price).
            tags: [hotel, detail, travel, agentscope]
            examples:
              - "查一下 hotel id BJ-001 的详细信息"
              - "Show room offers for hotel id SHA-042"
            input-modes: [text]
            output-modes: [text]

hotel-agent:
  llm:
    api-key:       ${LLM_API_KEY:sk-local-placeholder}
    api-base:      ${LLM_API_BASE:http://localhost:4000/v1}
    endpoint-path: ${LLM_ENDPOINT_PATH:/chat/completions}
    model-name:    ${LLM_MODEL:gpt-4o-mini}

logging:
  level:
    com.huawei.ascend.examples.agentscope.hotel: INFO
    com.huawei.ascend.runtime: INFO
    io.agentscope: INFO