debug: false

agent-runtime:
  access:
    a2a:
      default-tenant-id: sample-tenant
      default-agent-id: openjiwen-memory-agent

sample:
  openjiuwen:
    model-provider: ${SAA_SAMPLE_OPENJIUWEN_MODEL_PROVIDER:dashscope}
    api-key: ${SAA_SAMPLE_OPENJIUWEN_API_KEY:sk-xxxx}
    api-base: ${SAA_SAMPLE_OPENJIUWEN_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model-name: ${SAA_SAMPLE_OPENJIUWEN_MODEL_NAME:qwen3.7-max}
    ssl-verify: ${SAA_SAMPLE_OPENJIUWEN_SSL_VERIFY:false}
    checkpointer: ${SAA_SAMPLE_OPENJIUWEN_CHECKPOINTER:in-memory}
    redis-url: ${SAA_SAMPLE_OPENJIUWEN_REDIS_URL:redis://localhost:6379}
    memory-base-url: ${SAA_SAMPLE_OPENJIUWEN_MEMORY_BASE_URL:http://localhost:8000}
