# Module metadata for agent-service.
# Required by CLAUDE.md Rule 31 (Independent Module Evolution).
# Authority: ADR-0078 (agent-service consolidation), ADR-0066 (Independent Module Evolution).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-service
kind: domain
version: 0.1.0-SNAPSHOT
semver_compatibility: 0.x
description: "Combined HTTP edge + reference adapter host. Sub-package layering: service.platform owns HTTP/JWT/idempotency/tenant + persistence + probes; service.runtime owns memory.spi + resilience.spi + posture-gated reference (inmemory) executors and adapters (SyncOrchestrator, SequentialGraphExecutor, IterativeAgentLoopExecutor, InMemoryRunRegistry, InMemoryCheckpointer, DefaultSkillResilienceContract, YamlResilienceContract, YamlSkillCapacityRegistry). Orchestration/runs/s2c SPI extracted to agent-runtime-core per ADR-0079; module shape consolidated from agent-platform + agent-runtime per ADR-0078; canonical SPI ownership pinned by ADR-0082."
architecture_doc: agent-service/ARCHITECTURE.md
dfx_doc: docs/dfx/agent-service.yaml
spi_packages:
  - ascend.springai.service.runtime.memory.spi
  - ascend.springai.service.runtime.resilience.spi   # ResilienceContract + value types promoted to .spi per ADR-0080
allowed_dependencies:
  - agent-runtime-core
  - agent-execution-engine
  - agent-middleware
forbidden_dependencies: []
deployment_plane: compute_control
